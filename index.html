  <style>
    :root {
      --parchment:     #252015;
      --parchment-mid: #1e1a10;
      --parchment-dark:#15120a;
      --parchment-row: #2e2818;
      --ink:           #ddd0a8;
      --ink-mid:       #c0aa78;
      --ink-light:     #8a7a50;
      --forge-dark:    #0d0f0a;
      --forge-mid:     #121710;
      --forge-steel:   #1e2a1a;
      --forge-accent:  #c8973a;
      --forge-glow:    #e8b86d;
      --hdr-start:     #0d2e18;
      --hdr-mid:       #1d6632;
      --hdr-end:       #155228;
      --table-head:    #0d2e18;
      --table-head-txt:#a8d4b0;
      --table-head-bdr:#1d6632;
      --table-bg:      #1c1810;
      --card-bg:       #18140c;
      --input-bg:      #352e10;
      --input-txt:     #d8c890;
      --sel-row-bg:    #3a3018;
      --sel-row-bdr:   #8a6a20;
      --red-danger:    #7f1d1d;
      --shadow-deep:   0 4px 20px rgba(0,0,0,.6);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;overflow:hidden;}
    body{font-family:'Crimson Pro',Georgia,serif;background:var(--parchment);color:var(--ink);}

    /* ── Scrollbars ─────────────────── */
    ::-webkit-scrollbar{width:7px;height:7px;}
    ::-webkit-scrollbar-track{background:var(--parchment-mid);}
    ::-webkit-scrollbar-thumb{background:var(--parchment-dark);border-radius:4px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--ink-light);}

    /* ── Modal ──────────────────────── */
    .modal-overlay{position:fixed;inset:0;background:rgba(10,12,20,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
    .modal{background:var(--parchment);border-radius:6px;width:660px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-deep);border:1px solid var(--parchment-dark);}
    .modal-head{
      background:linear-gradient(135deg, var(--forge-dark) 0%, var(--forge-mid) 100%);
      color:var(--forge-glow);
      padding:14px 18px;border-radius:6px 6px 0 0;
      display:flex;justify-content:space-between;align-items:center;
      font-family:'Cinzel',serif;font-size:14px;letter-spacing:.04em;
      border-bottom:2px solid var(--forge-accent);
    }
    .modal-body{overflow-y:auto;padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px;background:var(--parchment);}
    .modal-body .full{grid-column:1/-1;}
    .modal-foot{padding:12px 18px;border-top:1px solid var(--parchment-dark);display:flex;justify-content:flex-end;gap:8px;background:var(--parchment-mid);border-radius:0 0 6px 6px;}
    .field-label{font-size:11px;font-weight:600;color:var(--ink-mid);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.06em;font-family:'Crimson Pro',serif;}
    .field-input{width:100%;padding:5px 8px;border:1px solid var(--parchment-dark);border-radius:3px;font-size:14px;font-family:'Crimson Pro',serif;background:var(--input-bg);color:var(--ink);}
    .field-input:focus{outline:none;border-color:#34A853;box-shadow:0 0 0 2px rgba(52,168,83,.18);}
    textarea.field-input{resize:vertical;min-height:52px;}

    /* ── Buttons ────────────────────── */
    button:focus:not(:focus-visible){outline:none;}
    button{outline:none;}
    .btn{border:none;border-radius:3px;padding:6px 16px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Crimson Pro',serif;letter-spacing:.03em;transition:all .15s;}
    .btn-save{background:#34A853;color:#fff;}
    .btn-cancel{background:var(--parchment-dark);color:var(--ink-mid);}
    .btn-clear{background:var(--red-danger);color:#fff;}
    .btn-save:hover{filter:brightness(1.1);}
    .btn-cancel:hover{background:var(--ink-light);color:#fff;}
    .btn-clear:hover{filter:brightness(1.1);}

    /* ── Drop zone ──────────────────── */
    .drop-zone{border:2px dashed var(--parchment-dark);border-radius:5px;padding:10px 14px;text-align:center;cursor:pointer;transition:all .15s;background:var(--parchment-mid);}
    .drop-zone:hover,.drop-zone.drag-over{background:var(--parchment);border-color:#34A853;}
    .drop-zone input{display:none;}

    /* ── Scrollbar ──────────────────── */
    ::-webkit-scrollbar-thumb:hover{background:#34A853;}

    /* ── Tier badges ────────────────── */
    .tier-t0  {background:linear-gradient(135deg,#2a2318 0%,#3d3220 50%,#2a2318 100%); color:#a08050; border:1px solid #5a4a30; box-shadow:0 0 3px rgba(90,74,48,.4);}
    .tier-t1  {background:linear-gradient(135deg,#3d1f0a 0%,#6a3518 40%,#8a5030 55%,#6a3518 70%,#3d1f0a 100%); color:#f0b888; border:1px solid #a05828; box-shadow:0 0 6px rgba(180,90,30,.5), inset 0 1px 0 rgba(255,180,100,.15);}  /* Copper */
    .tier-t2  {background:linear-gradient(135deg,#1a1e22 0%,#2e3a44 40%,#4a6070 55%,#2e3a44 70%,#1a1e22 100%); color:#b8d0e0; border:1px solid #4a6070; box-shadow:0 0 6px rgba(100,160,200,.35), inset 0 1px 0 rgba(180,220,255,.15);}  /* Silver */
    .tier-t3  {background:linear-gradient(135deg,#2a1a00 0%,#543200 40%,#7a4e00 55%,#543200 70%,#2a1a00 100%); color:#fcd878; border:1px solid #a06000; box-shadow:0 0 6px rgba(220,140,0,.45), inset 0 1px 0 rgba(255,220,80,.15);}  /* Gold */
    .tier-badge{display:inline-block;border-radius:3px;padding:1px 7px;font-size:11px;font-weight:700;font-family:'Crimson Pro',serif;letter-spacing:.04em;}

    /* ── Placeholder text ───────────── */
    ::placeholder { color: #7a6840; opacity: 1; }

    /* ── Checkbox ───────────────────── */
    input[type="checkbox"]{
      appearance:none; -webkit-appearance:none;
      width:14px; height:14px; cursor:pointer;
      background:var(--input-bg); border:1px solid var(--parchment-dark);
      border-radius:2px; vertical-align:middle; position:relative; flex-shrink:0;
      transition: background .1s;
    }
    input[type="checkbox"]:checked{
      background:#1a4a2e;
      border-color:#34A853;
    }
    input[type="checkbox"]:checked::after{
      content:'✓'; position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; color:#6ee87a; font-weight:700; line-height:1;
    }
    .craft-pill{display:inline-block;border-radius:10px;padding:1px 8px;font-size:12px;font-weight:700;letter-spacing:.02em;}

    /* ── Section badges ─────────────── */
    .badge-incomplete{background:#c2410c;color:#fff;border-radius:3px;padding:1px 6px;font-size:11px;font-weight:700;margin-left:5px;}
    .badge-edited     {background:#6d28d9;color:#fff;border-radius:3px;padding:1px 6px;font-size:11px;font-weight:700;margin-left:5px;}
  </style>
</head>

function parseSkillLine(line) {
  const m = line.match(/Skill Rating: (.+?) ([+-]\d+)d4/);
  if (!m) return null;
  return { skill: m[1], dice: parseInt(m[2]), sign: m[2][0] === '-' ? -1 : 1 };
}
function parseWarmth(str) {
  if (!str) return 0;
  const m = str.match(/([+-]\d+)/);
  return m ? parseInt(m[1]) : 0;
}
function getSkillLines(item) { return [item.sr1, item.sr2, item.sr3, item.sr4].filter(Boolean); }
function getPenaltyLines(item) {
  if (!item.sk_pen) return [];
  return item.sk_pen.split('\n').filter(Boolean);
}

  if (!tier) return '';

    { key:'sale',  label:'Sale',  val: item.sale },
    { key:'per',   label:'PER',   val: item.per },
    { key:'per30', label:'30%',   val: item.per30 },
  ].filter(s => s.val != null && s.val !== '');
  const economy = [
    { key:'yield_val',     label:'Yield',       val: item.yield_val },
    { key:'cxp',           label:'CXP',         val: item.cxp },
    { key:'cxp_per_res',   label:'CXP/Res',     val: item.cxp_per_res },
    { key:'coins_per_cxp', label:'Coins/CXP',   val: item.coins_per_cxp },
  ].filter(s => s.val != null && s.val !== '');
  const matParts = item.materials
    ? item.materials.split(/, (?=\d+[×x])/).map(p => {
        const m = p.match(/^(\d+)[×x]\s*(.+)$/);
        return m ? `×${m[1]} ${m[2]}` : p;
      })
    : [];
  const stats = [
    { label: 'Skill Ratings',         val: item.skill_ratings },
    { label: 'Decreased SR',          val: item.sk_pen },
    { label: 'Caster Rating',         val: item.caster },
    { label: 'Ki Rating',             val: item.ki },
    { label: 'Deflection Rating',     val: item.deflection },
    { label: 'Warmth Factor',         val: item.warmth },
    { label: 'ASF',                   val: item.arcane },
    { label: 'DMG Immunity',          val: item.dmg_imm },
    { label: 'DMG Vulnerability',     val: item.dmg_vul },
    { label: 'Saving Throws',         val: item.saving },
    { label: 'Reduced Saving Throws', val: item.saving_red },
    { label: 'Concealment',           val: item.conceal },
    { label: 'Weight',                val: item.weight },
    { label: 'DMG Bonus',             val: item.dmg_bonus },
    { label: 'ATK Bonus',             val: item.atk_bonus },
    { label: 'Bonus Spell Slot',      val: item.spell },
    { label: 'Enhancement Bonus',     val: item.enhance },
    { label: 'Bonus Feat',            val: item.feat },
    { label: 'Climbing Modifier',     val: item.climb },
    { label: 'Weight Reduction',      val: item.wt_red },
    { label: 'Use Limitation',        val: item.use },
  ].filter(s => s.val != null && s.val !== '');

  const rowStyle = { display:'flex', gap:12, fontSize:15, padding:'3px 0',
    borderBottom:'1px solid rgba(255,255,255,0.06)' };
  const labelStyle = { color:'var(--ink-mid)', flexShrink:0 };
  const valStyle   = { color:'var(--ink-light)' };

  const R = React.createElement;
  return R('div', { className:'modal-overlay', onClick: onClose },
    R('div', { className:'modal', style:{
        maxWidth:550, width:'96vw',
        background:'var(--card-bg)', border:'1px solid #1d6632', borderRadius:8,
        boxShadow:'0 8px 40px rgba(0,0,0,.7), 0 0 0 1px rgba(52,168,83,.25), 0 0 40px rgba(29,102,50,.2)',
        overflow:'hidden', position:'relative' },
      onClick: e => e.stopPropagation() },

      // Top accent bar
      R('div', { style:{ position:'absolute', top:0, left:0, right:0, height:12,
        background:'linear-gradient(90deg, #0d2e18 0%, #1d6632 25%, #34A853 50%, #1d6632 75%, #0d2e18 100%)',
        boxShadow:'0 2px 12px rgba(52,168,83,.55)', zIndex:1 } }),

      // Header
      R('div', { className:'modal-head', style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:12 } },
        R('span', { style:{ fontFamily:"'Cinzel',serif", fontSize:16 } }, item.name),
        R('div', { style:{ display:'flex', gap:8, alignItems:'center' } },
          R(CraftPill, { craft: item.craft }),
          item.tier ? R('span', { className: tierClass(item.tier) }, tierLabel(item.tier)) : null,
          R('button', { className:'btn btn-cancel', style:{ padding:'2px 10px', fontSize:12 }, onClick: onClose }, '✕')
        )
      ),

      R('div', { className:'modal-body', style:{ gridTemplateColumns:'1fr', gap:10 } },

        // Line 1: Category · ECL · EF@
        R('div', { className:'full', style:{ display:'flex', gap:16, fontSize:15, color:'var(--ink-mid)' } },
          R('span', null, item.category),
          item.ecl ? R('span', null, 'ECL ', item.ecl) : null,
          item.ef  ? R('span', null, 'EF@ ', R('span', { style:{ color:'#a07830', fontWeight:600 } }, String(item.ef))) : null
        ),

        // Line 2: Economy (Yield / CXP / CXP per Res / Coins per CXP)
        economy.length > 0 ? R('div', { className:'full', style:{ display:'flex', gap:16, fontSize:14, color:'var(--ink-mid)', flexWrap:'wrap' } },
          economy.map(s =>
            R('span', { key: s.key },
              s.label + ': ',
              R('span', { style:{ color:'var(--ink-light)' } }, String(s.val))
            )
          )
        ) : null,

        // Two-column: Pricing (left) + Materials (right)
        (pricing.length > 0 || matParts.length > 0) ? R('div', { className:'full', style:{ display:'flex', gap:20, alignItems:'flex-start' } },
          // Left: Pricing
          pricing.length > 0 ? R('div', { style:{ flex:'0 0 150px' } },
            R('span', { className:'field-label' }, 'Pricing'),
            pricing.map(s =>
              R('div', { key: s.key, style: rowStyle },
                R('span', { style: labelStyle }, s.label + ':'),
                R('span', { style:{ color: COL_COLORS[s.key] || 'var(--ink-light)', fontWeight:600 } }, String(s.val))
              )
            )
          ) : null,
          // Right: Materials
          matParts.length > 0 ? R('div', { style:{ flex:'1 1 0' } },
            R('span', { className:'field-label' }, 'Materials'),
            matParts.map((p, i) =>
              R('div', { key: i, style:{ fontSize:15, padding:'3px 0', borderBottom:'1px solid rgba(255,255,255,0.06)', color:'var(--ink-light)' } }, p)
            )
          ) : null
        ) : null,

        // Stats — each on its own full-width row
        stats.length > 0 ? R('div', { className:'full' },
          R('span', { className:'field-label' }, 'Stats'),
          R('div', null,
            stats.map(s =>
              R('div', { key: s.label, style: rowStyle },
                R('span', { style: labelStyle }, s.label + ':'),
                R('span', { style:{ ...valStyle, marginLeft:8 } }, String(s.val))
              )
            )
          )
        ) : null,

        // Description
        item.description ? R('div', { className:'full' },
          R('span', { className:'field-label' }, 'Description'),
          R('div', { style:{ fontSize:15, fontStyle:'italic' } }, item.description)
        ) : null,

        // OOC / Misc
        item.ooc ? R('div', { className:'full' },
          R('span', { className:'field-label' }, 'OOC Notes'),
          R('div', { style:{ fontSize:15 } }, item.ooc)
        ) : null,
        item.misc ? R('div', { className:'full' },
          R('span', { className:'field-label' }, 'Miscellaneous'),
          R('div', { style:{ fontSize:15 } }, item.misc)
        ) : null
      ),

      R('div', { className:'modal-foot' },
        R('button', { className:'btn btn-cancel', onClick: onClose }, 'Close')
      )
    )
  );
}

function CatalogueView({ data, dataStatus, search, setSearch, debouncedSearch, craft, setCraft, tier, setTier, category, setCategory, skill, setSkill,
  sidebarOpen, setSidebarOpen, sidebarWidth, sidebarRef, startResize, S, hidden }) {
  const [popup, setPopup] = useState(null);
  const [catSortCol, setCatSortCol] = useState('craft');
  const [catSortDir, setCatSortDir] = useState('asc');
  const catToggleSort = (col) => { if (catSortCol === col) { setCatSortDir(d => d === 'asc' ? 'desc' : 'asc'); } else { setCatSortCol(col); setCatSortDir('asc'); } };
  const catSortArrow = (col) => catSortCol === col ? (catSortDir === 'asc' ? ' ▲' : ' ▼') : ' ⇅';

  const allCategories = useMemo(() => {
    const s = new Set();
    data.forEach(i => { if (i.category) s.add(i.category); });
    return ['All Categories', ...Array.from(s).sort()];
  }, [data]);

  const allSkills = useMemo(() => {
    const s = new Set();
    data.forEach(i => {
      getSkillLines(i).forEach(l => { const p = parseSkillLine(l); if (p) s.add(p.skill); });
      if (i.caster) s.add('Caster Rating');
      if (i.ki) s.add('Ki Rating');
      if (i.deflection) s.add('Deflection Rating');
    });
    return ['All Skills', ...Array.from(s).sort()];
  }, [data]);

  const filtered = useMemo(() => {
    const q = (debouncedSearch||'').trim().toLowerCase();
    const craftSet = craft instanceof Set ? craft : new Set(craft);
    const tierSet  = tier  instanceof Set ? tier  : new Set(tier);
    return data.filter(i => {
      if (craftSet.size && !craftSet.has(i.craft)) return false;
      if (tierSet.size) {
        const t = (i.tier||'').replace(/ variant.*$/i,'').trim();
        const tKey = t.match(/^T0/i) ? 'T0' : t;
        if (!tierSet.has(tKey)) return false;
      }
      if (category && category !== 'All Categories' && i.category !== category) return false;
      if (skill && skill !== 'All Skills') {
        const itemSkills = getSkillLines(i).map(l => parseSkillLine(l)?.skill).filter(Boolean);
        if (skill === 'Caster Rating') { if (!i.caster) return false; }
        else if (skill === 'Ki Rating') { if (!i.ki) return false; }
        else if (skill === 'Deflection Rating') { if (!i.deflection) return false; }
        else if (!itemSkills.includes(skill)) return false;
      }
      if (q && !(i.name||'').toLowerCase().includes(q) && !(i.description||'').toLowerCase().includes(q) && !(i.materials||'').toLowerCase().includes(q)) return false;
      return true;
    });
  }, [data, debouncedSearch, craft, tier, category, skill]);

  const SORTABLE_NUMERIC = new Set(['ecl','ef','cost','sale','per','per30','yield_val','cxp','cxp_per_res','coins_per_cxp']);
  const TIER_ORDER = {'T0 Basic':0,'T0 SURV':0,'T0':0,'T1':1,'T2':2,'T3':3};
  const CRAFT_ORDER = {'BS':0,'LW':1,'WW':2,'TINK':3,'ALCH':4,'SURV':5};
  const parseNum = (v) => { if (v == null || v === '' || v === 'MISSING PRICE') return null; const n = parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n) ? null : n; };
  const colVal = (item, col) => {
    if (col === 'tier')  return TIER_ORDER[item.tier] ?? 0;
    if (col === 'craft') return CRAFT_ORDER[item.craft] ?? 99;
    if (SORTABLE_NUMERIC.has(col)) return parseNum(item[col]);
    return (item[col] || '').toLowerCase();
  };
  const tiebreakers = (a, b) => {
    // Craft → Tier → Category → Name
    const chain = ['craft','tier','category','name'];
    for (const col of chain) {
      const av = colVal(a, col), bv = colVal(b, col);
      if (av == null && bv == null) continue;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (av < bv) return -1;
      if (av > bv) return 1;
    }
    return 0;
  };
  const catSortedFiltered = useMemo(() => {
    const arr = [...filtered];
    arr.sort((a, b) => {
      const col = catSortCol;
      const av = colVal(a, col), bv = colVal(b, col);
      // nulls always to bottom regardless of direction
      if (av == null && bv == null) return tiebreakers(a, b);
      if (av == null) return 1;
      if (bv == null) return -1;
      const primary = av < bv ? -1 : av > bv ? 1 : 0;
      if (primary !== 0) return catSortDir === 'asc' ? primary : -primary;
      return tiebreakers(a, b);
    });
    return arr;
  }, [filtered, catSortCol, catSortDir]);

  const highlight = (text, q) => {
    if (!q || !text) return text || '';
    const str = String(text);
    const idx = str.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return str;
    return R('span', null,
      str.slice(0, idx),
      R('span', { style:{ background:'rgba(200,134,10,0.35)', borderRadius:2, padding:'0 1px' } }, str.slice(idx, idx + q.length)),
      str.slice(idx + q.length)
    );
  };

  const R = React.createElement;
  const thStyle = { background:'var(--table-head)', color:'var(--table-head-txt)', padding:'5px 2px',
    fontFamily:"'Cinzel',serif", fontSize:9, fontWeight:700, letterSpacing:'.03em', textTransform:'uppercase',
    borderBottom:'1px solid var(--table-head-bdr)', whiteSpace:'nowrap', position:'sticky', top:0, zIndex:2 };
  const thSortStyle = { cursor:'pointer', userSelect:'none' };
  const SORTABLE_CAT = new Set(['craft','category','name','ecl','ef','tier','cost','sale','per','per30','yield_val','cxp','cxp_per_res','coins_per_cxp']);
  const tdStyle = { padding:'3px 6px', fontSize:14, borderBottom:'1px solid var(--parchment-dark)',
    whiteSpace:'nowrap', verticalAlign:'top' };
  // Per-column overrides: [width, extraStyle]
  const COL_STYLE = {
    craft:        { width:44,  padding:'3px 4px', textAlign:'center' },
    category:     { width:110, padding:'3px 5px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:110 },
    name:         { width:180, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:180 },
    ecl:          { width:16,  padding:'3px 1px', textAlign:'center' },
    ef:           { width:16,  padding:'3px 1px', textAlign:'center' },
    tier:         { width:20,  padding:'3px 1px', textAlign:'center' },
    cost:         { width:18,  padding:'3px 1px', textAlign:'center' },
    sale:         { width:18,  padding:'3px 1px', textAlign:'center' },
    per:          { width:18,  padding:'3px 1px', textAlign:'center' },
    per30:        { width:18,  padding:'3px 1px', textAlign:'center' },
    yield_val:    { width:16,  padding:'3px 1px', textAlign:'right' },
    cxp:          { width:16,  padding:'3px 1px', textAlign:'right' },
    materials:    { whiteSpace:'nowrap' },
    cxp_per_res:  { width:34,  padding:'3px 4px', textAlign:'right' },
    coins_per_cxp:{ width:34,  padding:'3px 4px', textAlign:'right' },
  };
  const thStyleFor = (key) => {
    const ow = COL_STYLE[key];
    if (!ow) return {};
    const out = {};
    if (ow.width)     out.width    = ow.width;
    if (ow.maxWidth)  out.maxWidth = ow.maxWidth;
    if (ow.textAlign) out.textAlign = ow.textAlign;
    if (ow.padding)   out.padding  = ow.padding;
    return out;
  };
  const stickyTd = { ...tdStyle, position:'sticky', left:0, zIndex:1, background:'var(--table-bg)' };

  const catFiltersActive = search.trim() !== '' || (craft instanceof Set ? craft.size < 6 : craft.length < 6)
    || (tier instanceof Set ? tier.size < 4 : tier.length < 4) || (category !== '' && category !== 'All Categories') || (skill !== '' && skill !== 'All Skills');
  const clearCatFilters = () => { setSearch(''); setCraft(new Set(['BS','LW','WW','TINK','ALCH','SURV'])); setTier(new Set(['T0','T1','T2','T3'])); setCategory('All Categories'); setSkill('All Skills'); };

  return R('div', { style:{ display: hidden ? 'none' : 'flex', height:'100%', overflow:'hidden' } },
    // ── Sidebar
    !sidebarOpen && R('div', {
      onClick: () => setSidebarOpen(true),
      style:{ width:18, background:C.parchMid, borderRight:`1px solid ${C.parchDark}`, cursor:'pointer',
        display:'flex', alignItems:'flex-start', justifyContent:'center', flexShrink:0, paddingTop:8 },
      title:'Open sidebar'
    }, R('span', { style:{ fontSize:14, color:C.inkMid, writingMode:'vertical-rl' } }, '▶ Filters')),
    sidebarOpen && R('div', { ref: sidebarRef, style:{ ...S.sidebar, width:sidebarWidth, position:'relative' } },
      R('button', { onClick: () => setSidebarOpen(false), title:'Collapse sidebar',
        style:{ position:'absolute', top:8, right:8, background:'none', border:'none', cursor:'pointer', fontSize:15, color:C.inkMid, lineHeight:1 } }, '◀'),
      R('div', null,
        R('label', { style: S.label }, R('span', { style: S.labelIcon }, '⌕'), R('span', { style: S.labelText }, 'Search')),
        R('input', { style: S.input, placeholder:'Name, description, ingredient…', value:search, onChange: e => setSearch(e.target.value) })
      ),
      R('div', null,
        R('label', { style: S.label }, R('span', { style: S.labelIcon }, '⚒'), R('span', { style: S.labelText }, 'Craft')),
        R('div', { style:{ display:'flex', flexDirection:'column', gap:3 } },
          ['BS','LW','WW','TINK','ALCH','SURV'].map(c =>
            R('label', { key:c, style:{ display:'flex', alignItems:'center', gap:6, fontSize:13, cursor:'pointer', userSelect:'none' } },
              R('input', { type:'checkbox', checked: (craft instanceof Set ? craft.has(c) : craft.includes(c)),
                onChange: () => setCraft(prev => { const s = new Set(prev); s.has(c) ? s.delete(c) : s.add(c); return s; }),
                style:{ cursor:'pointer' } }),
              R('span', null, R('b', null, c), ' — ', CRAFT_LABELS[c])
            )
          )
        )
      ),
      R('div', null,
        R('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:5 } },
          [['T0','tier-t0'],['T1','tier-t1'],['T2','tier-t2'],['T3','tier-t3']].map(([key, cls]) => {
            const active = tier instanceof Set ? tier.has(key) : tier.includes(key);
            return R('span', { key, className:`tier-badge ${cls}`,
              onClick: () => setTier(prev => { const s = new Set(prev); s.has(key) ? s.delete(key) : s.add(key); return s; }),
              style:{ textAlign:'center', cursor:'pointer', opacity: active ? 1 : 0.25,
                filter: active ? 'none' : 'grayscale(1)', transition:'opacity .15s, filter .15s',
                userSelect:'none', padding:'4px 7px', display:'block' } },
              key
            );
          })
        )
      ),
      R('div', null,
        R('label', { style: S.label }, R('span', { style: S.labelIcon }, '❑'), R('span', { style: S.labelText }, 'Category')),
        R('select', { style: S.select, value: category, onChange: e => setCategory(e.target.value) },
          allCategories.map(cat => R('option', { key:cat, value:cat }, cat))
        )
      ),
      R('div', null,
        R('label', { style: S.label }, R('span', { style: S.labelIcon }, '✦'), R('span', { style: S.labelText }, 'Skill')),
        R('select', { style: S.select, value: skill, onChange: e => setSkill(e.target.value) },
          allSkills.map(s => R('option', { key:s, value:s }, s))
        )
      ),
      R('button', { onClick: clearCatFilters, style:{
        background:'none', border:`1px solid ${C.parchDark}`, borderRadius:3,
        padding:'3px 10px', fontSize:12, cursor:'pointer', color:C.inkMid,
        width:'100%', fontFamily:"'Crimson Pro',serif", letterSpacing:'.03em',
        textAlign:'center', transition:'color .15s, border-color .15s', marginTop:-10,
        opacity: catFiltersActive ? 1 : 0.4,
      } }, '✕ Clear filters'),
      R('button', { onClick: () => { setCatSortCol('craft'); setCatSortDir('asc'); }, style:{
        background:'none', border:`1px solid ${C.parchDark}`, borderRadius:3,
        padding:'3px 10px', fontSize:12, cursor:'pointer', color:C.inkMid,
        width:'100%', fontFamily:"'Crimson Pro',serif", letterSpacing:'.03em',
        textAlign:'center', transition:'color .15s, border-color .15s', marginTop:4,
        opacity: (catSortCol !== 'craft' || catSortDir !== 'asc') ? 1 : 0.4,
      } }, '⟳ Default sort'),
      R('div', { onMouseDown: startResize, style:{ position:'absolute', top:0, right:0, width:5, height:'100%', cursor:'col-resize', zIndex:10 } }),
      R('div', { style:{ position:'absolute', bottom:6, left:0, right:0, textAlign:'center', fontSize:10,
        fontFamily:"'Crimson Pro',serif", letterSpacing:'.08em', pointerEvents:'none', opacity: 0.85 } },
        R('div', { style:{ color: dataStatus==='live'||dataStatus==='updated' ? '#34a853' : dataStatus==='error' ? '#c05040' : dataStatus==='cached'||dataStatus==='cached-offline' ? C.inkMid : C.inkLight } },
          dataStatus==='live'           ? '● live from Sheets' :
          dataStatus==='updated'        ? '↻ Updated' :
          dataStatus==='cached'         ? '● cached — refreshing…' :
          dataStatus==='cached-offline' ? '● cached — offline' :
          dataStatus==='error'          ? '⚠ offline — no data' :
          '◌ loading…'
        ),
        R('div', { style:{ color: C.inkLight, marginTop:2 } }, 'v4.9.34')
      )
    ),
    // ── Table
    R('div', { style:{ flex:1, overflowX:'auto', overflowY:'auto', background:'var(--table-bg)' } },
      R('table', { style:{ borderCollapse:'collapse', width:'max-content', minWidth:'100%' } },
        R('thead', null,
          R('tr', null,
            CAT_COLS.map((col, i) => {
              const sortable = SORTABLE_CAT.has(col.key);
              return R('th', {
                key: col.key,
                onClick: sortable ? () => catToggleSort(col.key) : undefined,
                style:{ ...thStyle, ...thStyleFor(col.key), ...(i===2 ? { position:'sticky', left:0, zIndex:3 } : {}), ...(sortable ? thSortStyle : {}) }
              },
                col.label, sortable ? R('span', { style:{ opacity: catSortCol===col.key ? 1 : 0.35, fontSize:9, marginLeft:1 } }, catSortArrow(col.key)) : null
              );
            })
          )
        ),
        R('tbody', null,
          catSortedFiltered.map((item, ri) =>
            R('tr', { key: item.name + ri,
              style:{ background: ri%2===0 ? 'var(--table-bg)' : 'var(--parchment-row)', cursor:'pointer' },
              onClick: () => setPopup(item) },
              CAT_COLS.map((col, ci) => {
                let val = item[col.key];
                let cell;
                if (col.key === 'craft') {
                  cell = R(CraftPill, { craft: val || '' });
                } else if (col.key === 'tier') {
                  cell = val ? R('span', { className: tierClass(val) }, tierLabel(val)) : null;
                } else if (col.key === 'name') {
                  const q = (debouncedSearch||'').trim().toLowerCase();
                  cell = R('span', { title: val || '', style:{ display:'block', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' } }, highlight(val, q));
                } else if (col.key === 'materials') {
                  const q = (debouncedSearch||'').trim().toLowerCase();
                  const parts = (val||'').split(/, (?=\d+[×x])/);
                  const fmt = p => { const m = p.match(/^(\d+)[×x]\s*(.+)$/); return m ? `×${m[1]} ${m[2]}` : p; };
                  cell = R('span', { style:{ whiteSpace:'nowrap' } },
                    parts.flatMap((p, i) => i === 0
                      ? [highlight(fmt(p), q)]
                      : [R('span', { key:`sep${i}`, style:{ color:'var(--ink-light)', margin:'0 6px' } }, '∙'), highlight(fmt(p), q)]
                    )
                  );
                } else if (col.key === 'description') {
                  cell = R('span', { title: val || '', style:{ display:'block', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' } }, val || '');
                } else if (['cost','sale','per','per30'].includes(col.key) && val === 'MISSING PRICE') {
                  cell = R('span', { title:'MISSING PRICE', style:{ color:'var(--ink-light)', fontStyle:'italic' } }, '?');
                } else {
                  const colColor = COL_COLORS[col.key];
                  cell = val != null
                    ? (colColor ? R('span', { style:{ color: colColor, fontWeight:600 } }, String(val)) : String(val))
                    : '';
                }
                const colOver = COL_STYLE[col.key] || {};
                const baseTd  = ci===2 ? stickyTd : tdStyle;
                return R('td', { key:col.key, style:{ ...baseTd, ...colOver } }, cell);
              })
            )
          )
        )
      )
    ),
    // ── Popup
    popup ? R(CatPopup, { item: popup, onClose: () => setPopup(null) }) : null
  );
}

// ── Main Component ────────────────────────────────────────────────────────────
function BuildPlanner() {
  const [selected,     setSelected]    = useState(new Map());
  const [search,       setSearch]      = useState('');

  const [craftFilter,  setCraft]       = useState(new Set(['BS','LW','WW','TINK','SURV']));

  const [catFilter,    setCat]         = useState('All Categories');

  const [skillFilter,  setSkill]       = useState('All Skills');

  const toggleTier = t => setTierFilter(prev => { const n = new Set(prev); n.has(t) ? n.delete(t) : n.add(t); return n; });
  const filtersActive = search !== '' || catFilter !== 'All Categories' || skillFilter !== 'All Skills' || craftFilter.size < 5 || tierFilter.size < 4;
  const [appMode,      setAppMode]     = useState('catalogue');
  const [guildOpen,    setGuildOpen]   = useState(false);

  // ── Catalogue data: cache-first, background refresh ──────────────────────
  function transformItems(items) {
    return items.map(item => {
      const parts = (item.skill_ratings || '').split('\n').filter(Boolean);
      item.sr1 = parts[0] || null;
      item.sr2 = parts[1] || null;
      item.sr3 = parts[2] || null;
      item.sr4 = parts[3] || null;
      item.dmg_atk = [item.dmg_bonus, item.atk_bonus].filter(Boolean).join('\n') || null;
      return item;
    });
  }
  const CACHE_KEY = 'ggvl-catalogue-cache';
  const dataFingerprint = (arr) => arr.length + '|' + (arr[0]?.name||'') + '|' + (arr[arr.length-1]?.name||'');
  const SAMPLE = transformItems(GGVL_SAMPLE_DATA);

  const getInitialData = () => {
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) { const parsed = JSON.parse(cached); if (Array.isArray(parsed) && parsed.length > 0) return parsed; }
    } catch(e) {}
    return SAMPLE;
  };
  const getInitialStatus = () => {
    try { const cached = localStorage.getItem(CACHE_KEY); if (cached) return 'cached'; } catch(e) {}
    return 'loading';
  };

  const [catalogueData,   setCatalogueData]   = useState(() => getInitialData());
  const [rawData,         setRawData]         = useState(() => getInitialData());
  const [catalogueStatus, setCatalogueStatus] = useState(() => getInitialStatus());

  useEffect(() => {
    let cancelled = false;
    async function loadCatalogue() {
      try {
        const res  = await fetch(GGVL_ENDPOINT);
        const data = await res.json();
        if (!cancelled && Array.isArray(data) && data.length > 0) {
          const transformed = transformItems(data);
          // Detect change vs current data
          let prevFingerprint = '';
          try { const cached = localStorage.getItem(CACHE_KEY); if (cached) { const p = JSON.parse(cached); prevFingerprint = dataFingerprint(p); } } catch(e) {}
          const newFingerprint = dataFingerprint(transformed);
          const changed = newFingerprint !== prevFingerprint;
          try { localStorage.setItem(CACHE_KEY, JSON.stringify(transformed)); } catch(e) {}
          setCatalogueData(transformed);
          setRawData(transformed);
          if (changed && prevFingerprint !== '') {
            setCatalogueStatus('updated');
            setTimeout(() => { if (!cancelled) setCatalogueStatus('live'); }, 2500);
          } else {
            setCatalogueStatus('live');
          }
        }
      } catch(e) {
        if (!cancelled) {
          const hasCached = catalogueStatus === 'cached';
          setCatalogueStatus(hasCached ? 'cached-offline' : 'error');
        }
      }
    }
    loadCatalogue();
    return () => { cancelled = true; };
  }, []);
  const [catSearch,    setCatSearch]   = useState('');
  const [debouncedCatSearch, setDebouncedCatSearch] = useState('');
  useEffect(() => { const t = setTimeout(() => setDebouncedCatSearch(catSearch), 150); return () => clearTimeout(t); }, [catSearch]);
  const [catCraft,     setCatCraft]    = useState(new Set(['BS','LW','WW','TINK','ALCH','SURV']));
  const [catTier,      setCatTier]     = useState(new Set(['T0','T1','T2','T3']));
  const [catCategory,  setCatCategory] = useState('');
  const [catSkill,     setCatSkill]    = useState('All Skills');
  const [view,         setView]        = useState('browse');
  const [sortCol,      setSortCol]     = useState('name');
  const [sortDir,      setSortDir]     = useState('asc');
  const [skillSortDir, setSkillSortDir] = useState('desc');
  const toggleSort = (col) => { if (sortCol === col) { setSortDir(d => d === 'asc' ? 'desc' : 'asc'); } else { setSortCol(col); setSortDir('asc'); } };
  const sortArrow = (col) => sortCol === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';

  const [tourOpen,     setTourOpen]    = useState(() => !localStorage.getItem('ggvl-tour-seen'));
  const [tourStep,     setTourStep]    = useState(0);
  const [catTourOpen,  setCatTourOpen] = useState(false);
  const [catTourStep,  setCatTourStep] = useState(0);
  const CAT_TOUR_SLIDES = [
    {
      icon: '⚒',
      title: 'GGVL Crafting Catalogue',
      rows: [
        'Every craftable item across all six crafts, live from the master spreadsheet.',
        'Switch between the Catalogue and Build Planner using the titles at the top.',
      ],
    },
    {
      icon: '❖',
      title: 'Filtering',
      rows: [
        'Use the sidebar to filter by Craft, tier, and category — filters combine.',
        'The search bar finds items by name across the entire catalogue.',
      ],
    },
    {
      icon: '₡',
      title: 'Pricing Columns',
      rows: [
        <span><span style={{color:'#ea4335',fontWeight:600}}>Cost</span> — base material cost</span>,
        <span><span style={{color:'#3c78d8',fontWeight:600}}>Sale</span> — cost plus time worked (CXP)</span>,
        <span><span style={{color:'#6ee87a',fontWeight:600}}>PER</span> — sell value per yield</span>,
        <span><span style={{color:'#edbe00',fontWeight:600}}>30%</span> — shop price with tax markup</span>,
      ],
    },
    {
      icon: '⎘',
      title: 'Item Card',
      rows: [
        'Click any item row to open its full detail card.',

    },
    {

      title: 'Live Data',
      rows: [
        'Catalogue data loads fresh from the GGVL master sheet on every visit.',

  ];
  const TOUR_SLIDES = [
    {
      icon: '⚒',
      title: 'Welcome to the GGVL Build Planner',
      body: 'Plan your equipment builds from the full crafting catalogue.\nNo spreadsheet required!',
    },
    {
      icon: '≡',
      title: 'Browse Items',
      body: 'Use the sidebar to filter by craft, category, or skill.\nClick any column header to sort, or search by name.',
    },
    {
      icon: '☑',
      title: 'Selecting Items',
      body: 'Tick the box next to an item to add it to your build.\nCheckboxes show how many you can equip.',
    },
    {
      icon: '⌸',
      title: 'Build Summary',

    },
    {
      icon: '★',

    },
    {
      icon: '⍟',
      title: 'Presets',
      body: 'Hit the + in the tab bar to save a named preset.\nClick a tab to load it, ↺ to update it.',
    },
    {
      icon: '↥',
      title: 'Export',
      body: 'Hit the ≡ Export Text in Build Summary\nto copy your full build to the clipboard.',
    },
  ];
  const tourSlide = TOUR_SLIDES[tourStep];
  const tourLast  = tourStep === TOUR_SLIDES.length - 1;
  const closeTour = () => { localStorage.setItem('ggvl-tour-seen', '1'); setTourOpen(false); };

  const savePreset = () => {
    if (selCount === 0) return;
    setSavingPreset(true);
    setPresetInput('');
  };
  const confirmSavePreset = () => {
    if (!presetInput.trim()) return;
    const entry = { name: presetInput.trim(), selected: Array.from(selected.entries()), mwEntries };
    const updated = [...presets, entry];
    setPresets(updated);
    savePresets(updated);
    setSavingPreset(false);
    setPresetInput('');
  };
  const loadPreset = (entry) => {
    setSelected(new Map(entry.selected));
    setMwEntries(entry.mwEntries || []);
    setActivePresetName(entry.name);
    setView('summary');
    setSidebarOpen(false);
  };

  const [srWide, setSrWide] = useState(() => localStorage.getItem('ggvl-sr-wide') !== 'false');
  const toggleSrWide = () => setSrWide(prev => { const next = !prev; localStorage.setItem('ggvl-sr-wide', next); return next; });
  const [confirmingUpdate, setConfirmingUpdate] = useState(false);
  const confirmUpdateRef = React.useRef(null);
  const requestUpdatePreset = () => {
    setConfirmingUpdate(true);
    confirmUpdateRef.current = setTimeout(() => setConfirmingUpdate(false), 4000);
  };
  const cancelUpdatePreset = () => {
    clearTimeout(confirmUpdateRef.current);
    setConfirmingUpdate(false);
  };
  const commitUpdatePreset = () => {
    clearTimeout(confirmUpdateRef.current);
    setConfirmingUpdate(false);
    const updated = presets.map(p =>
      p.name === activePresetName
        ? { ...p, selected: Array.from(selected.entries()), mwEntries }
        : p
    );
    setPresets(updated);
    savePresets(updated);
  };
  const deletePreset = (idx) => {
    const updated = presets.filter((_,i) => i !== idx);
    setPresets(updated);
    savePresets(updated);
  };

  const exportBuild = () => {
    const lines = [];
    lines.push(activePresetName ? `=== ${activePresetName} ===` : '=== GGVL Build ===');
    lines.push('');

    // Items
    lines.push('── Items ──');
    summary.items.forEach(i => lines.push(`• ${i.name}`));
    lines.push('');

    // Skill Ratings
    if (Object.keys(summary.skillMap).length > 0) {
      lines.push('── Skill Ratings ──');
      Object.entries(summary.skillMap).sort((a,b) => a[0].localeCompare(b[0])).forEach(([sk, en]) => {
        const pos  = en.filter(e => e.sign > 0 && !e.mw).reduce((s,e) => s + e.dice, 0);
        const neg  = en.filter(e => e.sign < 0 && !e.mw).reduce((s,e) => s + e.dice, 0);
        const flat = en.filter(e => e.mw).reduce((s,e) => s + e.dice * e.sign, 0);
        const parts = [];
        if (pos && neg) parts.push(`+${pos}d4 / -${neg}d4`);
        else if (pos)   parts.push(`+${pos}d4`);
        else if (neg)   parts.push(`-${neg}d4`);
        if (flat) parts.push(`${flat >= 0 ? '+' : ''}${flat}`);
        lines.push(`${sk}: ${parts.join(' ') || '0'}`);
      });
      lines.push('');
    }

    // Additional Ratings
    const hasAdditional = Object.keys(summary.caster).length || summary.ki.length || summary.deflection.length || summary.evasion.length || summary.defense.length;
    if (hasAdditional) {
      lines.push('── Additional Ratings ──');
      Object.entries(summary.caster).sort((a,b) => a[0].localeCompare(b[0])).forEach(([cls, entries]) => {
        const t = entries.reduce((s,d) => { const m = d.line.match(/([+-]?\d+)$/); return s+(m?parseInt(m[1]):0); }, 0);
        lines.push(`Caster Rating: ${cls}: +${t} total`);
      });
      if (summary.ki.length) {
        const diceT = summary.ki.filter(d=>!d.mw).reduce((s,d) => { const m = d.line.match(/([+-]?\d+)d4/); return s+(m?parseInt(m[1]):0); },0);
        const flatT = summary.ki.filter(d=>d.mw).reduce((s,d) => { const m = d.line.match(/([+-]?\d+)$/); return s+(m?parseInt(m[1]):0); },0);
        const parts = []; if (diceT) parts.push(`+${diceT}d4`); if (flatT) parts.push(`+${flatT}`);
        lines.push(`Ki Rating: ${parts.join(' ') || '0'} total`);
      }
      if (summary.deflection.length) {
        const t = summary.deflection.reduce((s,d) => { const m = d.line.match(/([+-]?\d+)$/); return s+(m?parseInt(m[1]):0); },0);
        lines.push(`Deflection Rating: +${t} total`);
      }
      if (summary.evasion.length) {
        const t = summary.evasion.reduce((s,d) => { const m = d.line.match(/([+-]?\d+)$/); return s+(m?parseInt(m[1]):0); },0);
        lines.push(`Evasion Rating: +${t} total`);
      }
      if (summary.defense.length) {
        const t = summary.defense.reduce((s,d) => { const m = d.line.match(/([+-]?\d+)$/); return s+(m?parseInt(m[1]):0); },0);
        lines.push(`Defense Rating: +${t} total`);
      }
      lines.push('');
    }

    // Warmth
    if (summary.warmthTotal > 0) {
      lines.push('── Warmth ──');
      lines.push(`Total Warmth Factor: +${summary.warmthTotal}`);
      lines.push('');
    }

    // Damage Immunities
    if (Object.keys(summary.dmgImmTotals).length > 0) {
      lines.push('── Damage Immunities ──');
      Object.entries(summary.dmgImmTotals).forEach(([t,v]) => lines.push(`${t}: ${v}%`));
      lines.push('');
    }

    // Damage Vulnerabilities
    if (Object.keys(summary.dmgVulTotals).length > 0) {
      lines.push('── Damage Vulnerabilities ──');
      Object.entries(summary.dmgVulTotals).forEach(([t,v]) => lines.push(`${t}: ${v}%`));
      lines.push('');
    }

    // Skill Penalties
    if (Object.keys(summary.penaltyMap).length > 0) {
      lines.push('── Skill Penalties ──');
      Object.entries(summary.penaltyMap).sort((a,b) => a[0].localeCompare(b[0])).forEach(([sk, en]) => {
        const diceTotal = en.filter(e => !e.flat).reduce((s,e) => s+e.dice, 0);
        const flatTotal = en.filter(e => e.flat).reduce((s,e) => s+e.dice, 0);
        const parts = [];
        if (diceTotal) parts.push(`-${diceTotal}d4`);
        if (flatTotal) parts.push(`-${flatTotal}`);
        lines.push(`${sk}: ${parts.join(' ') || '0'}`);
      });
      lines.push('');
    }

    lines.push('Generated by GGVL Build Planner');

    // Masterwork Properties
    if (mwEntries.length > 0) {
      lines.push('');
      lines.push('── Masterwork Properties ──');
      mwEntries.forEach(e => lines.push(`${e.property}: +${e.value}`));
    }

    const text = lines.join('\n');
    const finish = () => { setExportCopied(true); setTimeout(() => setExportCopied(false), 2000); };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(finish).catch(() => fallbackCopy(text, finish));
    } else {
      fallbackCopy(text, finish);
    }
  };

  const fallbackCopy = (text, cb) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); cb(); } catch(e) { alert('Copy failed — please copy manually:\n\n' + text); }
    document.body.removeChild(ta);
  };

  const RAW_DATA = rawData;
  const BROWSEABLE = useMemo(() => RAW_DATA.filter(i => !isExcluded(i)).length, []);

  const allCats   = useMemo(() => ['All Categories', ...Array.from(new Set(RAW_DATA.filter(i => !isExcluded(i)).map(i => i.category || '').filter(Boolean))).sort()], [RAW_DATA]);
  const allSkills = useMemo(() => {
    const s = new Set();
    const included = RAW_DATA.filter(i => !isExcluded(i));
    // sr1/sr2/sr3 skill ratings
    included.forEach(i => getSkillLines(i).forEach(l => { const p = parseSkillLine(l); if (p) s.add(p.skill); }));
    // caster rating
    included.forEach(i => { if (i.caster) s.add('Caster Rating'); });
    // ki rating
    included.forEach(i => { if (i.ki) s.add('Ki Rating'); });
    // deflection rating
    included.forEach(i => { if (i.deflection) s.add('Deflection Rating'); });
    // remove skills that only appear as penalties (sk_pen only, never in sr1/sr2/sr3)
    const penOnly = new Set();
    included.forEach(i => { if (i.sk_pen) i.sk_pen.split('\n').forEach(l => { const m = l.match(/Decreased Skill Rating: (.+?) /); if (m && !s.has(m[1])) penOnly.add(m[1]); }); });
    penOnly.forEach(p => s.delete(p));
    return ['All Skills', ...Array.from(s).sort()];
  }, [RAW_DATA]);

  const filtered = useMemo(() => {
    const q = debouncedSearch.toLowerCase();
    return RAW_DATA.filter(i => {
      if (isExcluded(i)) return false;
      if (!craftFilter.has(i.craft)) return false;
      if (catFilter   !== 'All Categories' && (i.category || '') !== catFilter) return false;
      if (skillFilter !== 'All Skills') {
        const skills = getSkillLines(i).map(l => parseSkillLine(l)?.skill).filter(Boolean);
        if (skillFilter === 'Ki Rating') { if (!i.ki) return false; }
        else if (skillFilter === 'Deflection Rating') { if (!i.deflection) return false; }
        else if (skillFilter === 'Caster Rating') { if (!i.caster) return false; } else if (!skills.includes(skillFilter)) return false;
      }
      if (q && !i.name.toLowerCase().includes(q)) return false;
      const tierKey = !i.tier ? 'T0' : i.tier.startsWith('T0') ? 'T0' : i.tier === 'T1' ? 'T1' : i.tier === 'T2' ? 'T2' : i.tier === 'T3' ? 'T3' : 'T1';
      if (!tierFilter.has(tierKey)) return false;
      return true;
    });
  }, [RAW_DATA, debouncedSearch, craftFilter, catFilter, skillFilter, tierFilter]);

  const getMaxSkillDice = (item, skill) => {
    // Returns highest signed die count for a specific skill, or across all skills if skill=null
    let max = null;
    getSkillLines(item).forEach(l => {
      const p = parseSkillLine(l);
      if (!p) return;
      if (skill && skill !== 'All Skills' && p.skill !== skill) return;
      const val = p.dice * p.sign; // e.g. +2d4 → 2, -1d4 → -1
      if (max === null || val > max) max = val;
    });
    return max; // null = no skill ratings
  };

  const sortedFiltered = useMemo(() => {
    const arr = [...filtered];
    if (sortCol === 'skillRating') {
      const skill = skillFilter !== 'All Skills' ? skillFilter : null;
      arr.sort((a, b) => {
        const av = getMaxSkillDice(a, skill);
        const bv = getMaxSkillDice(b, skill);
        // items with no ratings go to bottom
        if (av === null && bv === null) return 0;
        if (av === null) return 1;
        if (bv === null) return -1;
        return skillSortDir === 'desc' ? bv - av : av - bv;
      });
      return arr;
    }
    arr.sort((a, b) => {
      let av, bv;
      if (sortCol === 'ecl') { av = parseInt(a.ecl) || 0; bv = parseInt(b.ecl) || 0; }
      else if (sortCol === 'tier') { const o = {'T0 Basic':0,'T0 SURV':0,'T0':0,'T1':1,'T2':2,'T3':3}; av = o[a.tier]??0; bv = o[b.tier]??0; }
      else if (sortCol === 'category') { av = (a.category||'').toLowerCase(); bv = (b.category||'').toLowerCase(); }
      else { av = (a.name||'').toLowerCase(); bv = (b.name||'').toLowerCase(); }
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return arr;
  }, [filtered, sortCol, sortDir, skillSortDir, skillFilter]);

  const RING_EXCEPTIONS = new Set(['Copper Ring Mail','Bronze Ring Mail','Iron Ring Mail']);
  const isRing = name => /\bRing\b/i.test(name) && !RING_EXCEPTIONS.has(name);

  const MULTI_SLOT = [
    { test: n => /Cold Weather/i.test(n),              max: 3 },
    { test: n => /Heavy Shield Plating/i.test(n),      max: 2 },
    { test: n => /Accessory Reinforcement/i.test(n),   max: 4 },
    { test: n => /Weapon Guard/i.test(n),              max: 2 },
    { test: n => /Weaving Reinforcement/i.test(n),     max: 2 },
  ];
  const getMaxSlots = name => {
    if (isRing(name)) return 2;
    const entry = MULTI_SLOT.find(e => e.test(name));
    return entry ? entry.max : 1;
  };
  const isMultiSlot = name => getMaxSlots(name) > 1;

  const selCount = useMemo(() => Array.from(selected.values()).reduce((s,v) => s+v, 0), [selected]);

  const toggle = name => { setSelected(prev => {
    const n = new Map(prev);
    const cur = n.get(name) || 0;
    if (cur === 0) { n.set(name, 1); }
    else { n.delete(name); }
    return n;
  }); };
  const setSlot = (name, slot, checked) => setSelected(prev => {
    const n = new Map(prev);
    const cur = n.get(name) || 0;
    if (checked) { n.set(name, Math.max(slot, cur)); }
    else {
      if (slot === 1) { n.delete(name); }
      else { n.set(name, slot - 1); }
    }
    return n;
  });
  const removeOne = name => setSelected(prev => {
    const n = new Map(prev);
    const cur = n.get(name) || 0;
    if (cur <= 1) n.delete(name); else n.set(name, cur - 1);
    return n;
  });

  // ── Build summary ────────────────────────────────────────────────────────
  const summary = useMemo(() => {
    const items = [];
    RAW_DATA.forEach(i => { const c = selected.get(i.name); if (c) for (let x=0;x<c;x++) items.push(i); });
    const skillMap = {}, penaltyMap = {};
    const dmgImm=[], dmgVul=[], dmgAtk=[], saving=[];
    const warmthItems=[], arcane=[], conceal=[], caster={}, ki=[], deflection=[], evasion=[], defense=[];
    const spell=[], climb=[], wt_red=[], feat=[], enhance=[], use=[], misc=[], weightItems=[];
    let weightTotal = 0;
    let warmthTotal = 0;
    items.forEach(item => {
      getSkillLines(item).forEach(line => {
        const p = parseSkillLine(line); if (!p) return;
        if (!skillMap[p.skill]) skillMap[p.skill] = [];
        skillMap[p.skill].push({ item: item.name, dice: Math.abs(p.dice), sign: p.sign });
      });
      getPenaltyLines(item).forEach(line => {
        const mDice = line.match(/Decreased Skill Rating: (.+?) (-\d+)d4/);
        const mFlat = !mDice && line.match(/Decreased Skill Rating: (.+?) (-\d+)$/);
        const m = mDice || mFlat;
        if (!m) return;
        if (!penaltyMap[m[1]]) penaltyMap[m[1]] = [];
        penaltyMap[m[1]].push({ item: item.name, dice: Math.abs(parseInt(m[2])), flat: !!mFlat });
      });
      if (item.dmg_imm) item.dmg_imm.split('\n').forEach(l => l && dmgImm.push({ item: item.name, line: l }));
      if (item.dmg_vul) item.dmg_vul.split('\n').forEach(l => l && dmgVul.push({ item: item.name, line: l }));
      if (item.dmg_atk) item.dmg_atk.split('\n').forEach(l => l && dmgAtk.push({ item: item.name, line: l }));
      if (item.saving)  item.saving.split('\n').forEach(l => l && saving.push({ item: item.name, line: l }));
      if (item.warmth)  { warmthTotal += parseWarmth(item.warmth); warmthItems.push({ item: item.name, val: item.warmth }); }
      if (item.arcane)  arcane.push({ item: item.name, line: item.arcane });
      if (item.conceal) conceal.push({ item: item.name, line: item.conceal });
      if (item.caster)  item.caster.split('\n').forEach(l => {
        if (!l) return;
        const m = l.match(/Caster Rating: (\w+) ([+-]?\d+)/);
        const cls = m ? m[1] : 'Unknown';
        if (!caster[cls]) caster[cls] = [];
        caster[cls].push({ item: item.name, line: l });
      });
      if (item.ki)      ki.push({ item: item.name, line: item.ki });
      if (item.deflection) deflection.push({ item: item.name, line: item.deflection });
      if (item.spell)   item.spell.split('\n').forEach(l => l && spell.push({ item: item.name, line: l }));
      if (item.climb)   climb.push({ item: item.name, line: item.climb });
      if (item.wt_red)  wt_red.push({ item: item.name, line: item.wt_red });
      if (item.weight)  { const m = item.weight.match(/([\d.]+)\s*lbs/i); const v = m ? parseFloat(m[1]) : 0; weightItems.push({ item: item.name, val: item.weight, num: v }); weightTotal += v; }
      if (item.feat)    item.feat.split('\n').forEach(l => l && feat.push({ item: item.name, line: l }));
      if (item.enhance) enhance.push({ item: item.name, line: item.enhance });
      if (item.use)     item.use.split('\n').forEach(l => l && use.push({ item: item.name, line: l }));
      if (item.misc)    item.misc.split('\n').forEach(l => l && misc.push({ item: item.name, line: l }));
    });
    // Inject masterwork skill bonuses (flat, not dice)
    mwEntries.forEach(e => {
      if (MW_SKILLS.includes(e.property)) {
        if (!skillMap[e.property]) skillMap[e.property] = [];
        skillMap[e.property].push({ item: 'Masterwork', dice: e.value, sign: 1, mw: true });
      }
    });
    // Inject masterwork rating bonuses
    mwEntries.forEach(e => {
      if (e.property.startsWith('Caster Rating: ')) {
        const cls = e.property.replace('Caster Rating: ', '');
        if (!caster[cls]) caster[cls] = [];
        caster[cls].push({ item: 'Masterwork', line: `${e.property} +${e.value}`, mw: true });
      }
      if (e.property === 'Ki Rating')         ki.push({ item: 'Masterwork', line: `Ki Rating: +${e.value}`, mw: true });
      if (e.property === 'Deflection Rating') deflection.push({ item: 'Masterwork', line: `Deflection Rating: +${e.value}`, mw: true });
      if (e.property === 'Evasion Rating')    evasion.push({ item: 'Masterwork', line: `Evasion Rating: +${e.value}`, mw: true });
      if (e.property === 'Defense Rating')    defense.push({ item: 'Masterwork', line: `Defense Rating: +${e.value}`, mw: true });
    });
    // Tally dmg immunity & vulnerability totals by damage type
    const parseDmgPct = (lines) => {
      const totals = {};
      lines.forEach(({ line }) => {
        const m = line.match(/:\s*([A-Za-z ]+?)\s+(\d+)%/);
        if (m) { const t = m[1].trim(); totals[t] = (totals[t] || 0) + parseInt(m[2]); }
      });
      return totals;
    };
    const dmgImmTotals = parseDmgPct(dmgImm);
    const dmgVulTotals = parseDmgPct(dmgVul);
    return { items, skillMap, penaltyMap, dmgImm, dmgVul, dmgAtk, saving, warmthTotal, warmthItems, dmgImmTotals, dmgVulTotals, arcane, conceal, caster, ki, deflection, evasion, defense, spell, climb, wt_red, feat, enhance, use, misc, weightItems, weightTotal };
  }, [selected, RAW_DATA, mwEntries]);

  // ── Styles ────────────────────────────────────────────────────────────────
  const S = {
    app:      { fontFamily:"'Crimson Pro',Georgia,serif", fontSize:15, background:C.parchment, height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden', color:C.ink },

    // ── Header ──
    header: {
      background: `linear-gradient(135deg, var(--hdr-start) 0%, var(--hdr-mid) 60%, var(--hdr-end) 100%)`,
      color: C.glow,
      padding: '10px 24px 12px',
      display: 'flex', alignItems: 'stretch', justifyContent: 'space-between',
      flexShrink: 0,
      borderBottom: `3px solid ${C.accent}`,
      boxShadow: '0 3px 16px rgba(0,0,0,.45)',
      minHeight: 56,
      position: 'relative',
    },
    headerInner: { display:'flex', alignItems:'center', justifyContent:'space-between', width:'100%' },
    title: {
      fontFamily:"'Cinzel',serif", fontSize:26, fontWeight:700,

      textShadow:'0 0 18px rgba(200,151,58,.4)',
    },
    subtitle: { fontFamily:"'Crimson Pro',serif", fontSize:14, color:'rgba(232,184,109,.65)', letterSpacing:'.10em', textTransform:'uppercase', marginTop:3 },
    badge: {
      background:'rgba(200,151,58,.18)', color:C.glow,
      border:`1px solid rgba(200,151,58,.4)`,
      borderRadius:12, padding:'3px 12px', fontWeight:700, fontSize:13,
      fontFamily:"'Cinzel',serif", letterSpacing:'.04em',
    },

    // ── Source bar ──
    sourceBar: {
      fontSize:12, color:C.inkLight, padding:'4px 20px',
      background:C.parchMid, borderBottom:`1px solid ${C.parchDark}`,
      flexShrink:0, display:'flex', alignItems:'center', gap:10,
      fontStyle:'italic',
    },

    // ── Tabs ──
    tabs:  { display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`2px solid ${C.parchDark}`, background:C.parchment, padding:'0 20px', flexShrink:0 },
    tab:   a => ({
      padding:'8px 12px 8px 6px', cursor:'pointer',
      fontFamily:"'Cinzel',serif", fontSize:13, letterSpacing:'.04em',
      fontWeight: a ? 700 : 400,

      background:'none', border:'none', transition:'color .15s',
    }),

    // ── Layout ──
    body:    { display:'flex', flex:1, overflow:'hidden' },
    sidebar: {

      borderRight:`1px solid ${C.parchDark}`,
      padding:14, overflowY:'auto', flexShrink:0,
      display:'flex', flexDirection:'column', gap:12,
    },
    label:   { fontWeight:700, color:C.inkMid, marginBottom:3, display:'block', letterSpacing:'.06em' },
    labelIcon: { fontSize:18, lineHeight:1, marginRight:3, display:'inline-block', verticalAlign:'middle' },
    labelText: { fontSize:14, textTransform:'uppercase', letterSpacing:'.06em', verticalAlign:'middle' },
    input:   { width:'100%', padding:'5px 8px', border:`1px solid ${C.parchDark}`, borderRadius:3, fontSize:14, fontFamily:"'Crimson Pro',serif", background:'var(--input-bg)', color:'var(--input-txt)' },
    select:  { width:'100%', padding:'5px 8px', border:`1px solid ${C.parchDark}`, borderRadius:3, fontSize:14, fontFamily:"'Crimson Pro',serif", background:'var(--input-bg)', color:'var(--input-txt)' },
    main:    { flex:1, overflowY:'auto', padding:16, background:C.parchment },

    // ── Table ──
    table: { width:'100%', borderCollapse:'collapse', fontSize:14, background:'var(--table-bg)', boxShadow:'0 1px 6px rgba(0,0,0,.1)', borderRadius:4, overflow:'hidden' },
    thSort: { color:C.accent, cursor:'pointer', userSelect:'none' },
    th:    bg => ({ background: bg||'var(--table-head)', color:'var(--table-head-txt)', padding:'7px 10px', textAlign:'left', fontWeight:700, fontSize:12, borderBottom:`1px solid var(--table-head-bdr)`, whiteSpace:'nowrap', letterSpacing:'.05em', textTransform:'uppercase', fontFamily:"'Cinzel',serif" }),
    td:    { padding:'5px 10px', verticalAlign:'top', borderBottom:`1px solid var(--parchment-dark)`, fontSize:14 },

    pill:  c => ({ background:c, borderRadius:10, padding:'1px 8px', fontSize:12, fontWeight:700, display:'inline-block' }),

    // ── Summary cards ──
    summCard: {
      background:'var(--card-bg)',
      border:`1px solid ${C.parchDark}`,
      borderRadius:5,
      marginBottom:14,
      overflow:'hidden',
      boxShadow:'0 2px 8px rgba(0,0,0,.08)',
      breakInside:'avoid',
    },
    summHead: (color, accent) => ({
      background: `linear-gradient(135deg, ${color} 0%, ${accent||color} 100%)`,
      color:'#fff',
      padding:'8px 16px',
      fontFamily:"'Cinzel',serif",
      fontWeight:700, fontSize:13, letterSpacing:'.06em',
      borderBottom:`2px solid rgba(255,255,255,.15)`,
      textShadow:'0 1px 3px rgba(0,0,0,.4)',
      display:'flex', alignItems:'center', gap:8,
    }),
    summBody: { padding:'12px 16px', background:'var(--card-bg)' },

    row:     { display:'flex', justifyContent:'space-between', padding:'3px 0', borderBottom:`1px solid ${C.parchMid}`, fontSize:14 },
    itemTag: { fontSize:12, color:C.inkMid, fontStyle:'italic', marginLeft:8, flexShrink:0 },
    diceGood:{ fontWeight:700, color:C.green },
    diceBad: { fontWeight:700, color:C.red },
    noItems: { color:C.inkLight, fontStyle:'italic', padding:12, textAlign:'center' },

    clearBtn: { background:C.red,  color:'#fff', border:'none', borderRadius:3, padding:'4px 11px', cursor:'pointer', fontSize:12, fontFamily:"'Crimson Pro',serif" },
    selCount: { background:'rgba(200,151,58,.18)', color:C.glow, border:`1px solid rgba(200,151,58,.4)`, borderRadius:4, padding:'3px 10px', fontSize:13, fontWeight:700, fontFamily:"'Cinzel',serif" },
    stubBadge:{ background:'#c2410c', color:'#fff', borderRadius:3, padding:'0 5px', fontSize:11, fontWeight:700, marginLeft:5, verticalAlign:'middle' },
    ovBadge:  { background:'#6d28d9', color:'#fff', borderRadius:3, padding:'0 5px', fontSize:11, fontWeight:700, marginLeft:5, verticalAlign:'middle' },
  };

  // Tier badge helper
  const tierBadge = (tier) => {
    if (!tier) return null;
    const cls = tier.startsWith('T0') ? 'tier-t0' : tier === 'T1' ? 'tier-t1' : tier === 'T2' ? 'tier-t2' : tier === 'T3' ? 'tier-t3' : 'tier-t1';
    const label = tier.startsWith('T0') ? 'T0' : tier;
    return <span className={`tier-badge ${cls}`}>{label}</span>;
  };

  const SectionCard = ({ title, color, accent, icon, children }) => (
    <div style={S.summCard}>
      <div style={S.summHead(color, accent)}>{icon && <span>{icon}</span>}{title}</div>
      <div style={S.summBody}>{children}</div>
    </div>
  );

  const PropRow = ({ line, itemName }) => (
    <div style={S.row}><span>{line}</span><span style={S.itemTag}>{itemName}</span></div>
  );

  const SkillRow = ({ skill, entries }) => {
    const diceTotal = entries.filter(e => !e.mw).reduce((s, e) => s + e.dice * e.sign, 0);
    const flatTotal = entries.filter(e => e.mw).reduce((s, e) => s + e.dice * e.sign, 0);
    const totalStr = (() => {
      const parts = [];
      if (diceTotal !== 0) parts.push(`${diceTotal >= 0 ? '+' : ''}${diceTotal}d4`);
      if (flatTotal !== 0) parts.push(`${flatTotal >= 0 ? '+' : ''}${flatTotal}`);
      return (parts.join(' ') || '0') + ' total';
    })();
    const totalPositive = (diceTotal + flatTotal) >= 0;
    return (
      <div style={{ marginBottom: 9 }}>
        <div style={{ fontWeight: 700, fontSize: 13, color: C.ink, marginBottom: 2 }}>
          {skill} <span style={totalPositive ? S.diceGood : S.diceBad}>{totalStr}</span>
        </div>
        {entries.map((e, i) => (
          <div key={i} style={{ ...S.row, paddingLeft: 10 }}>
            <span style={e.mw ? {fontWeight:700,color:'#FBBF24'} : (e.sign > 0 ? S.diceGood : S.diceBad)}>{e.sign > 0 ? '+' : '-'}{e.dice}{e.mw ? '' : 'd4'}</span>
            <span style={e.mw ? {fontSize:11,color:'#FBBF24',fontStyle:'italic'} : S.itemTag}>{e.mw ? '⭐ Masterwork' : e.item}</span>
          </div>
        ))}
      </div>
    );
  };

  const getRowBg = (item, ri) => ri % 2 === 0 ? C.parchMid : (CRAFT_BG[item.craft] || C.parchMid);

  return (
    <div style={S.app}>

      {/* Header */}
      <div style={S.header}>
        <div style={S.headerInner}>
          <div style={{ display:'flex', flexDirection:'column', justifyContent:'center' }}>
            <h1 style={{...S.title, display:'flex', alignItems:'baseline', gap:0, whiteSpace:'normal'}}>
              <span style={{ marginRight:12, whiteSpace:'nowrap' }}>GGVL</span>
              <button type="button" onClick={() => { setAppMode('catalogue'); if (!localStorage.getItem('ggvl-cat-tour-seen')) { setCatTourStep(0); setCatTourOpen(true); } }} style={{
                background:'none', border:'none', cursor:'pointer', padding:0,
                fontFamily:"'Cinzel',serif", fontWeight:700, fontSize:'inherit', letterSpacing:'.06em',
                color: appMode==='catalogue' ? C.glow : 'rgba(232,184,109,.25)',
                textShadow: appMode==='catalogue' ? '0 0 22px rgba(232,184,109,.7), 0 0 8px rgba(200,151,58,.5)' : 'none',
                transition:'color .2s, text-shadow .2s', lineHeight:'inherit', whiteSpace:'nowrap'
              }}>Catalogue</button>
              <span style={{ whiteSpace:'nowrap', color:'rgba(232,184,109,.4)', fontWeight:400, margin:'0 10px' }}>&amp;</span>
              <button type="button" onClick={()=>setAppMode('planner')} style={{
                background:'none', border:'none', cursor:'pointer', padding:0,
                fontFamily:"'Cinzel',serif", fontWeight:700, fontSize:'inherit', letterSpacing:'.06em',
                color: appMode==='planner' ? C.glow : 'rgba(232,184,109,.25)',
                textShadow: appMode==='planner' ? '0 0 22px rgba(232,184,109,.7), 0 0 8px rgba(200,151,58,.5)' : 'none',
                transition:'color .2s, text-shadow .2s', lineHeight:'inherit', whiteSpace:'nowrap'
              }}>Build Planner ⚒</button>
            </h1>
            <div style={S.subtitle}>
              Gwylim, Gunak, Vicho, & Lain —{' '}
              <span
                onClick={() => setGuildOpen(true)}
                style={{ cursor:'pointer', transition:'color .15s' }}
                >
                Guildmember&#39;s
              </span>
              {' '}Crafting Resource
            </div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            {appMode === 'planner' && selCount > 0 && <span style={S.selCount}>{selCount} selected</span>}
            <button type="button" onClick={() => { if (appMode === 'catalogue') { setCatTourStep(0); setCatTourOpen(true); } else { setTourStep(0); setTourOpen(true); } }}
              style={{ background:'none', border:`1px solid rgba(200,151,58,.4)`, borderRadius:'50%',
                width:26, height:26, cursor:'pointer', color:C.glow, fontSize:13, fontWeight:700,
                fontFamily:"'Cinzel',serif", lineHeight:1, flexShrink:0 }}
              title="Help / Tour">?</button>
          </div>
        </div>
      </div>

      {/* Source bar removed from header area — now in sidebar footer */}

      <CatalogueView
        hidden={appMode !== 'catalogue'}
        data={catalogueData}
        dataStatus={catalogueStatus}
        search={catSearch} setSearch={setCatSearch}
        debouncedSearch={debouncedCatSearch}
        craft={catCraft} setCraft={setCatCraft}
        tier={catTier} setTier={setCatTier}
        category={catCategory} setCategory={setCatCategory}
        skill={catSkill} setSkill={setCatSkill}
        sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen}
        sidebarWidth={sidebarWidth} sidebarRef={sidebarRef} startResize={startResize}
        S={S}
      />

      {appMode === 'planner' && <React.Fragment>

      {rawData.length === 0
        ? <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:300, fontSize:16, color:C.inkMid, opacity:0.6 }}>Loading items…</div>
        : <React.Fragment>

      {/* Outer flex row: sidebar + [tabs+body column] */}
      <div style={{ display:'flex', flex:1, overflow:'hidden' }}>

        {/* Sidebar */}
        {!sidebarOpen && (
          <div onClick={() => setSidebarOpen(true)} style={{ width:18, background:C.parchMid, borderRight:`1px solid ${C.parchDark}`, cursor:'pointer', display:'flex', alignItems:'flex-start', justifyContent:'center', flexShrink:0, paddingTop:8 }} title="Open sidebar">
            <span style={{ fontSize:14, color:C.inkMid, writingMode:'vertical-rl' }}>▶ Filters</span>
          </div>
        )}
        {sidebarOpen && (
        <div ref={sidebarRef} style={{...S.sidebar, width:sidebarWidth, position:'relative'}}>
          <button onClick={() => setSidebarOpen(false)} title="Collapse sidebar" style={{ position:'absolute', top:8, right:8, background:'none', border:'none', cursor:'pointer', fontSize:15, color:C.inkMid, lineHeight:1 }}>◀</button>
          <div>
            <label style={S.label}><span style={S.labelIcon}>⌕</span><span style={S.labelText}>Search</span></label>
            <input style={S.input} placeholder="Item name…" value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <div>
            <label style={S.label}><span style={S.labelIcon}>⚒</span><span style={S.labelText}>Craft</span></label>
            <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
              {['BS','LW','WW','TINK'].map(c => (
                <label key={c} style={{ display:'flex', alignItems:'center', gap:6, fontSize:13, cursor:'pointer', userSelect:'none' }}>
                  <input type="checkbox" checked={craftFilter.has(c)} onChange={() => toggleCraft(c)} style={{ cursor:'pointer' }} />
                  <span><b>{c}</b> — {CRAFT_LABELS[c]}</span>
                </label>
              ))}
              <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:13, userSelect:'none', opacity:0.35, cursor:'default' }} title="Alchemy items are not available in the Build Planner">
                <span style={{ fontSize:13, width:13, textAlign:'center', display:'inline-block' }}>×</span>
                <span><b>ALCH</b> — {CRAFT_LABELS['ALCH']}</span>
              </label>
              {['SURV'].map(c => (
                <label key={c} style={{ display:'flex', alignItems:'center', gap:6, fontSize:13, cursor:'pointer', userSelect:'none' }}>
                  <input type="checkbox" checked={craftFilter.has(c)} onChange={() => toggleCraft(c)} style={{ cursor:'pointer' }} />
                  <span><b>{c}</b> — {CRAFT_LABELS[c]}</span>
                </label>
              ))}
            </div>
          </div>
          <div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:5 }}>
              {[['T0','tier-t0','T0'],['T1','tier-t1','T1'],['T2','tier-t2','T2'],['T3','tier-t3','T3']].map(([key, cls, label]) => (
                <span key={key}
                  className={`tier-badge ${cls}`}
                  onClick={() => toggleTier(key)}
                  style={{ textAlign:'center', cursor:'pointer', opacity: tierFilter.has(key) ? 1 : 0.25,
                    filter: tierFilter.has(key) ? 'none' : 'grayscale(1)',
                    transition:'opacity .15s, filter .15s', userSelect:'none',
                    padding:'4px 7px', display:'block' }}>
                  {label}
                </span>
              ))}
            </div>
          </div>
          <div>
            <label style={S.label}><span style={S.labelIcon}>❑</span><span style={S.labelText}>Category</span></label>
            <select style={S.select} value={catFilter} onChange={e => setCat(e.target.value)}>
              {allCats.map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label style={S.label}><span style={S.labelIcon}>✦</span><span style={S.labelText}>Skill</span></label>
            <select style={S.select} value={skillFilter} onChange={e => setSkill(e.target.value)}>
              {allSkills.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>

          <button onClick={clearFilters} style={{
            background:'none', border:`1px solid ${C.parchDark}`, borderRadius:3,
            padding:'3px 10px', fontSize:12, cursor:'pointer', color:C.inkMid,
            width:'100%', fontFamily:"'Crimson Pro',serif", letterSpacing:'.03em',
            textAlign:'center', transition:'color .15s, border-color .15s',
            marginTop:-10, opacity: filtersActive ? 1 : 0.4,
          }}>✕ Clear filters</button>

          {/* Selected items */}
          {selCount > 0 && (
            <div>
              <div style={{ fontWeight: 'bold', fontSize: 11, color: C.inkMid, marginBottom: 4 }}>✓ Selected ({selCount})</div>
              {Array.from(selected.entries()).map(([n, cnt]) => (

                    {/* Input row — visible only when mwAdding */}
                    {mwAdding && (
                      <div style={{display:'flex',gap:6,marginBottom:8,alignItems:'center',flexWrap:'wrap'}}>

                          value={mwDropdown}
                          onChange={e => { const v = e.target.value; withScrollLock(() => setMwDropdown(v)); }}
                          style={{flex:'1 1 140px',minWidth:0,padding:'4px 6px',borderRadius:4,border:`1px solid #FBBF24`,background:'var(--card-bg)',color:C.ink,fontSize:13,fontFamily:"'Crimson Pro',serif"}}

                          <optgroup label="── Skills ──">

                          <span style={{color:'#FBBF24',fontWeight:700}}>+</span>

                            type="text" inputMode="numeric" value={mwValue}

                    {mwEntries.length === 0 && !mwAdding

                  {summary.weightItems.length > 0 && (

                    <SectionCard title="Other Properties" color="#5c4a2a" accent="#7a6340" icon="📜">

                      {summary.conceal.length > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Concealment</div>{summary.conceal.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.arcane.length  > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Arcane Spell Failure</div>{summary.arcane.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.enhance.length > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Enhancement Bonus</div>{summary.enhance.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.feat.length    > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Bonus Feats</div>{summary.feat.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.climb.length   > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Climbing Modifier</div>{summary.climb.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.wt_red.length  > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Weight Reduction</div>{summary.wt_red.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}

      {/* ── Tour Modal ── */}

          </div>
