                  <span style={{ fontSize:19, fontWeight:700, letterSpacing:'.04em',background:'linear-gradient(90deg, #c9973a 0%, #f5e199 30%, #e8b86d 50%, #f5e199 70%, #c9973a 100%)',backgroundSize:'200% auto', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',animation:'goldShimmer 8s linear infinite' }}>Vicho Arnden</span>
                  <span style={{ fontSize:16 }}>Gormrak Stormfist</span>
                  <span style={{ fontSize:16 }}>Bel-Durad Sternheart</span>
                  <span style={{ fontSize:16 }}>Taren Fairwarren</span>
                  <span style={{ fontSize:16 }}>Card</span>
                  <span style={{ fontSize:16 }}>Matthew</span>
                  <span style={{ fontSize:16 }}>Drogan Kragghammer</span>
                  <span style={{ fontSize:16 }}>Lavian</span>
                  <span style={{ fontSize:19, fontWeight:700, letterSpacing:'.04em',background:'linear-gradient(90deg, #c9973a 0%, #f5e199 30%, #e8b86d 50%, #f5e199 70%, #c9973a 100%)',backgroundSize:'200% auto', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',animation:'goldShimmer 8s linear infinite' }}>Nim</span>
                  <span style={{ fontSize:19, fontWeight:700, letterSpacing:'.04em',background:'linear-gradient(90deg, #c9973a 0%, #f5e199 30%, #e8b86d 50%, #f5e199 70%, #c9973a 100%)',backgroundSize:'200% auto', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',animation:'goldShimmer 8s linear infinite' }}>Durin Stonebeard</span>
                  <span style={{ fontSize:16 }}>Uk'lik</span>
                  <span style={{ fontSize:16 }}>Crystal</span>
                  <span style={{ fontSize:16 }}>Line Swift</span>
                  <span style={{ fontSize:16 }}>Tarathiel Evermeet</span>
                  <span style={{ fontSize:16 }}>Aluca Lethaniel</span>
                  <span style={{ fontSize:16 }}>Flare</span>
                  <span style={{ fontSize:16 }}>Ayleese</span>
                  <span style={{ textDecoration:'line-through', color:'rgba(180,160,120,.4)', fontSize:14 }}>Urist</span>
                  <span style={{ fontSize:16 }}>Rain</span>
                  <span style={{ fontSize:16 }}>Venn</span>
                  <span style={{ fontSize:16 }}>Heron</span>
                  <span style={{ fontSize:16 }}>Bramdun Hammerhand</span>
                  <span style={{ fontSize:19, fontWeight:700, letterSpacing:'.04em',background:'linear-gradient(90deg, #c9973a 0%, #f5e199 30%, #e8b86d 50%, #f5e199 70%, #c9973a 100%)',backgroundSize:'200% auto', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',animation:'goldShimmer 8s linear infinite' }}>Reg Nicken</span>
                  <span style={{ fontSize:16 }}>Bandlegin Stoneshield</span>
                  <span style={{ fontSize:16 }}>Zak</span>
                  <span style={{ fontSize:16 }}>Fyevarra</span>
                  <span style={{ fontSize:16 }}>Hunus Stonebrow</span>
                  <span style={{ fontSize:16 }}>Tulduil Zyrustine</span>
                  <span style={{ fontSize:16 }}>Drudo Telaes</span>
                  <span style={{ fontSize:16 }}>Belladonna Babblebrook</span>
                  <span style={{ fontSize:16 }}>Juniper Juneshine</span>
                  <span style={{ fontSize:16 }}>Ranos Badogan</span>
                  <span style={{ fontSize:16 }}>Grimdhur Goldenshard III</span>
                  <span style={{ textDecoration:'line-through', color:'rgba(180,160,120,.4)', fontSize:14 }}>Melyrian Amari</span>
                  <span style={{ fontSize:16 }}>Yenzu Warmspark</span>
                  <span style={{ fontSize:16 }}>Gram</span>
                  <span style={{ fontSize:16 }}>Narion</span>
                  <span style={{ fontSize:19, fontWeight:700, letterSpacing:'.04em',background:'linear-gradient(90deg, #c9973a 0%, #f5e199 30%, #e8b86d 50%, #f5e199 70%, #c9973a 100%)',backgroundSize:'200% auto', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',animation:'goldShimmer 8s linear infinite' }}>Negan Oakenheart</span>
                  <span style={{ fontSize:16 }}>Donovan “The Don” Don</span>
                  <span style={{ fontSize:16 }}>Cassidy Smith</span>
                  <span style={{ fontSize:16 }}>Khaleeda al-Haayat</span>
                  <span style={{ fontSize:16 }}>Aeriyanna</span>
                  <span style={{ fontSize:16 }}>Igni Moltenbeard</span>
                  <span style={{ fontSize:16 }}>Pear</span>
                  <span style={{ textDecoration:'line-through', color:'rgba(180,160,120,.4)', fontSize:14 }}>Roderick</span>
                  <span style={{ fontSize:16 }}>Yolanda Teakettle</span>
                  <span style={{ fontSize:16 }}>Gareth Little</span>
                  <span style={{ fontSize:16 }}>Nerida</span>
                  <span style={{ fontSize:16 }}>Leri</span>
                  <span style={{ fontSize:16 }}>Lilly Brightmire</span>
                  <span style={{ fontSize:16 }}>Zenbrix Hearthflame</span>
                  <span style={{ fontSize:16 }}>Gormar Coalbrow</span>
                  <span style={{ fontSize:16 }}>Fisher Clawhide</span>
                  <span style={{ fontSize:16 }}>Farin Flintfist</span>
                  <span style={{ fontSize:16 }}>Thyra the Cook</span>
              </div>
            </div>

          </div>
        </div>
      )}


    </div>
  );
}
