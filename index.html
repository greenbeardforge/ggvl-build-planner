<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    :root {
      --parchment:     #252015;
      --parchment-mid: #1e1a10;
      --parchment-dark:#15120a;
      --parchment-row: #2e2818;
      --ink:           #ddd0a8;
      --ink-mid:       #c0aa78;
      --ink-light:     #8a7a50;
      --forge-dark:    #0d0f0a;
      --forge-mid:     #121710;
      --forge-steel:   #1e2a1a;
      --forge-accent:  #c8973a;
      --forge-glow:    #e8b86d;
      --hdr-start:     #0d2e18;
      --hdr-mid:       #1d6632;
      --hdr-end:       #155228;
      --table-head:    #0d2e18;
      --table-head-txt:#a8d4b0;
      --table-head-bdr:#1d6632;
      --table-bg:      #1c1810;
      --card-bg:       #18140c;
      --input-bg:      #352e10;
      --input-txt:     #d8c890;
      --sel-row-bg:    #3a3018;
      --sel-row-bdr:   #8a6a20;
      --red-danger:    #7f1d1d;
      --shadow-deep:   0 4px 20px rgba(0,0,0,.6);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;overflow:hidden;}
    body{font-family:'Crimson Pro',Georgia,serif;background:var(--parchment);color:var(--ink);}

    /* ── Scrollbars ─────────────────── */
    ::-webkit-scrollbar{width:7px;height:7px;}
    ::-webkit-scrollbar-track{background:var(--parchment-mid);}
    ::-webkit-scrollbar-thumb{background:var(--parchment-dark);border-radius:4px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--ink-light);}

    /* ── Modal ──────────────────────── */
    .modal-overlay{position:fixed;inset:0;background:rgba(10,12,20,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
    .modal{background:var(--parchment);border-radius:6px;width:660px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-deep);border:1px solid var(--parchment-dark);}
    .modal-head{
      background:linear-gradient(135deg, var(--forge-dark) 0%, var(--forge-mid) 100%);
      color:var(--forge-glow);
      padding:14px 18px;border-radius:6px 6px 0 0;
      display:flex;justify-content:space-between;align-items:center;
      font-family:'Cinzel',serif;font-size:14px;letter-spacing:.04em;
      border-bottom:2px solid var(--forge-accent);
    }
    .modal-body{overflow-y:auto;padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px;background:var(--parchment);}
    .modal-body .full{grid-column:1/-1;}
    .modal-foot{padding:12px 18px;border-top:1px solid var(--parchment-dark);display:flex;justify-content:flex-end;gap:8px;background:var(--parchment-mid);border-radius:0 0 6px 6px;}
    .field-label{font-size:11px;font-weight:600;color:var(--ink-mid);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.06em;font-family:'Crimson Pro',serif;}
    .field-input{width:100%;padding:5px 8px;border:1px solid var(--parchment-dark);border-radius:3px;font-size:14px;font-family:'Crimson Pro',serif;background:var(--input-bg);color:var(--ink);}
    .field-input:focus{outline:none;border-color:#34A853;box-shadow:0 0 0 2px rgba(52,168,83,.18);}
    textarea.field-input{resize:vertical;min-height:52px;}

    /* ── Buttons ────────────────────── */
    .btn{border:none;border-radius:3px;padding:6px 16px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Crimson Pro',serif;letter-spacing:.03em;transition:all .15s;}
    .btn-save{background:#34A853;color:#fff;}
    .btn-cancel{background:var(--parchment-dark);color:var(--ink-mid);}
    .btn-clear{background:var(--red-danger);color:#fff;}
    .btn-save:hover{filter:brightness(1.1);}
    .btn-cancel:hover{background:var(--ink-light);color:#fff;}
    .btn-clear:hover{filter:brightness(1.1);}

    /* ── Drop zone ──────────────────── */
    .drop-zone{border:2px dashed var(--parchment-dark);border-radius:5px;padding:10px 14px;text-align:center;cursor:pointer;transition:all .15s;background:var(--parchment-mid);}
    .drop-zone:hover,.drop-zone.drag-over{background:var(--parchment);border-color:#34A853;}
    .drop-zone input{display:none;}

    /* ── Scrollbar ──────────────────── */
    ::-webkit-scrollbar-thumb:hover{background:#34A853;}

    /* ── Tier badges ────────────────── */
    .tier-t0  {background:linear-gradient(135deg,#2a2318 0%,#3d3220 50%,#2a2318 100%); color:#a08050; border:1px solid #5a4a30; box-shadow:0 0 3px rgba(90,74,48,.4);}
    .tier-t1  {background:linear-gradient(135deg,#3d1f0a 0%,#6a3518 40%,#8a5030 55%,#6a3518 70%,#3d1f0a 100%); color:#f0b888; border:1px solid #a05828; box-shadow:0 0 6px rgba(180,90,30,.5), inset 0 1px 0 rgba(255,180,100,.15);}  /* Copper */
    .tier-t2  {background:linear-gradient(135deg,#1a1e22 0%,#2e3a44 40%,#4a6070 55%,#2e3a44 70%,#1a1e22 100%); color:#b8d0e0; border:1px solid #4a6070; box-shadow:0 0 6px rgba(100,160,200,.35), inset 0 1px 0 rgba(180,220,255,.15);}  /* Silver */
    .tier-t3  {background:linear-gradient(135deg,#2a1a00 0%,#543200 40%,#7a4e00 55%,#543200 70%,#2a1a00 100%); color:#fcd878; border:1px solid #a06000; box-shadow:0 0 6px rgba(220,140,0,.45), inset 0 1px 0 rgba(255,220,80,.15);}  /* Gold */
    .tier-badge{display:inline-block;border-radius:3px;padding:1px 7px;font-size:11px;font-weight:700;font-family:'Crimson Pro',serif;letter-spacing:.04em;}

    /* ── Placeholder text ───────────── */
    ::placeholder { color: #7a6840; opacity: 1; }

    /* ── Checkbox ───────────────────── */
    input[type="checkbox"]{
      appearance:none; -webkit-appearance:none;
      width:14px; height:14px; cursor:pointer;
      background:var(--input-bg); border:1px solid var(--parchment-dark);
      border-radius:2px; vertical-align:middle; position:relative; flex-shrink:0;
      transition: background .1s;
    }
    input[type="checkbox"]:checked{
      background:#1a4a2e;
      border-color:#34A853;
    }
    input[type="checkbox"]:checked::after{
      content:'✓'; position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; color:#6ee87a; font-weight:700; line-height:1;
    }
    .craft-pill{display:inline-block;border-radius:10px;padding:1px 8px;font-size:12px;font-weight:700;letter-spacing:.02em;}

    /* ── Section badges ─────────────── */
    .badge-incomplete{background:#c2410c;color:#fff;border-radius:3px;padding:1px 6px;font-size:11px;font-weight:700;margin-left:5px;}
    .badge-edited     {background:#6d28d9;color:#fff;border-radius:3px;padding:1px 6px;font-size:11px;font-weight:700;margin-left:5px;}
  </style>
</head>

consisting of a flat, slablike top supported on one or more legs or other supports."},{"craft":"TINK","name":"Amethyst (Cut)","category":"[Gems]","ecl":"4","tier":"T1","description":"The most valued amethyst crystals are a milky, wine-dark purple. Some say that the original Amethyst was a young priestess favored by both Sune and Selune. The two goddesses fought over the girl and, in their folly, destroyed her. A single glance from Selune turned the girl into moonlight, all silver and transparent. As the struggle continued, a goblet of wine fell from Selune's feasting table, splashing onto Amethyst and granting her the gemstone's characteristic purple hue."},{"craft":"TINK","name":"Aventurine (Cut)","category":"[Gems]","ecl":"4","tier":"T1","description":"When cut and polished, aventurine is alluring as its name. It resembles misty quartz, but contains glistening flecks of green that give it a unique sheen. The witches of Rashemen are said to use aventurine for invocations, evocations, and spirit work."},{"craft":"TINK","name":"Fire Agate (Cut)","category":"[Gems]","ecl":"4","tier":"T1","description":"Fire agate forms in thin brown layers that refract the incoming light, giving the gem its \"fire.\" The refraction often forms patterns reminiscent of a dragon's scales, which makes it prized by sorcerers who claim to trace their lineage back to dragonkin. A well-cut stone has its outer layers polished and ground away until only the fire is visible."},{"craft":"TINK","name":"Garnet (Cut)","category":"[Gems]","ecl":"4","tier":"T1","description":"Often called the \"Poor Man's Ruby,\" the common garnet is nevertheless a distinct and attractive blood-red gem in its own right. The violet form, also called rhodolite, is the rarest, most prized, and most valuable form of the stone."},{"craft":"TINK","name":"Greenstone (Cut)","category":"[Gems]","ecl":"4","tier":"T1","description":"As its name indicates, this gem is generally green in color. Typical samples, however, have a pattern of overlapping edges that range from yellow-green to almost black. When polished, they have a beautiful play of light within their crystalline structure."},{"craft":"TINK","name":"Malachite (Cut)","category":"[Gems]","ecl":"4","tier":"T1","description":"Favored by druids for its graceful and natural beauty, malachite is known for its strikingly ornamental bands of light and dark green that alternate throughout the entire stone. Painters have also been known to crush the gem and use it as a pigment. Adventurers have discovered that the gem bubbles and dissolves readily in acid, making it an effective - if expensive - means of identifying certain dangerous substances."},{"craft":"TINK","name":"Onyx (Cut)","category":"[Gems]","ecl":"4","tier":"T1","description":"Onyx was a common stone among the drow, a gem worn by drow of average station, albeit they used only black ones."},{"craft":"TINK","name":"Phenalope (Cut)","category":"[Gems]","ecl":"4","tier":"T1","description":"A singularly beautiful stone, phenalope is dusty pink in color, dramatically marked with black streaks. Even when mounted in jewelry, phenalope maintains a rough texture, pocked with tiny holes that cannot be polished out. For some, this is part of the stone's attraction, and they wear it as a symbol of their own tenacious natures."},{"craft":"TINK","name":"Quartz (Cut)","category":"[Gems]","ecl":"4","tier":"T1","description":"A hexagonal crystal, quartz is quite common and comes in a variety of colors."},{"craft":"TINK","name":"Copper Amethyst Amulet","category":"[Jewelry]","ecl":"12","tier":"T1","sr1":"Skill Rating: Influence +1d4","saving":"Improved Saving Throws: Disease +1","description":"an amulet made from copper and amethyst"},{"craft":"TINK","name":"Copper Amethyst Circlet","category":"[Jewelry]","ecl":"15","tier":"T1","sr1":"Skill Rating: Knowledge: Arcane +2d4","sr2":"Skill Rating: Spellcraft +2d4","description":"A copper circlet, with a single amethyst in the head of the circlet."},{"c "Use: Unique Power Unlimited Uses/Day"},{"craft":"ALCH","name":"Medical Kit, Regular","category":"[Medicine]","ecl":"22","tier":"T2","description":"This bag contains many useful items for caring for the critically wounded, small needles, twine and pliers for extracting metal from flesh."},{"craft":"ALCH","name":"Sterile Bandage, Linen","category":"[Medicine]","ecl":"18","tier":"T2","description":"A sterile linen bandage used to mend wounds.","ooc":"OOC Information: Cannot be used to stabilize an unconscious person. Can only be used once every 90m. This bandage heals 2 hit points after succeeding on the DC 14 heal check, then +2hp for every point over the heal check DC 14 you exceed, to a max of 20hp.","misc":"Use: Unique Power Unlimited Uses/Day"},{"craft":"ALCH","name":"Fertilizer, Standard","category":"[Miscellaneous]","ecl":"18","tier":"T2","description":"Standard fertilizer, a balanced blend of essential nutrients, provides vital nourishment to the soil, fostering healthy plant growth and vibrant foliage.","ooc":"Starts with 10 charges"},{"craft":"ALCH","name":"Dust of Paralysis","category":"[Poison]","ecl":"22","tier":"T2","description":"Paralysing Dust is quite useful to sprinkle into food or drink to leave someone feeling quite vulnerable for a time.","misc":"Use: Unique Power Unlimited Uses/Day"},{"craft":"ALCH","name":"Vial of Hush Powder","category":"[Poison]","ecl":"16","tier":"T2","description":"Hush powder goes by many names, but one thing is almost universal, magic users fear it, and assassin's love it.","misc":"Use: Unique Power Unlimited Uses/Day"},{"craft":"ALCH","name":"Vial of Organic Mercury","category":"[Poison]","ecl":"16","tier":"T2","description":"Extracted from the kidneys of a fish, this vial of organic mercury has many alchemical users, or it works wonders to cause temporary blindness.","misc":"Use: Unique Power Unlimited Uses/Day"},{"craft":"ALCH","name":"Vial of Willow Paste","category":"[Poison]","ecl":"18","tier":"T2","description":"Willow Paste is a potent paste that can be used as a base for many alchemical studies, or it can be applied to food to cause temporary deafness.","misc":"Use: Unique Power Unlimited Uses/Day"},{"craft":"ALCH","name":"Antidote Tonic","category":"[Potion]","ecl":"18","tier":"T2","description":"This tonic is sovereign against venoms, mineral toxins, diseases, and poisons of all sorts.","misc":"Use: Neutralize Poison (5) Single Use"},{"craft":"ALCH","name":"Healing Tonic, Strong","category":"[Potion]","ecl":"21","tier":"T2","description":"Used as often in the peasant's home as the dungeon's dark, these simple concoctions are common throughout Faerun.","misc":"Use: Cure Moderate Wounds (3) Single Use"},{"craft":"ALCH","name":"Malady Tonic","category":"[Potion]","ecl":"15","tier":"T2","description":"This tonic is sovereign against diseases, of all sorts.","misc":"Use: Remove Disease (5) Single Use"},{"craft":"ALCH","name":"Tonic of Clairvoyance","category":"[Potion]","ecl":"16","tier":"T2","description":"This tonic seems to phase in and out of the bottle, looking like it turns transparent at times.","misc":"Use: Clairaudience/Clairvoyance (5) Single Use"},{"craft":"ALCH","name":"Tonic of Clarity","category":"[Potion]","ecl":"15","tier":"T2","description":"Made of hot liquid poured over scorched and pungent beans, this strong-smelling brew did not get its name from its appearance. It helps clear and fortify the mind against spells that affect the mind.","misc":"Use: Clarity (3) Single Use"},{"craft":"ALCH","name":"Tonic of Courage","category":"[Potion]","ecl":"25","tier":"T2","description":"Introducing the Tonic of Courage, a remarkable elixir that presents itself as a crystal-clear liquid, accentuated by the mesmerizing sight of floating red sparks that dance within its depths. This magical concoction holds the power to banish fear from the hearts of those who consume it. As the tonic is imbibed, a surge of bravery courses through the veins, dispelling any trace of trepidation or anxiety. The floating red sparks within the clear liquid serve as a visual representation of the extinguished fears, symbolizing the transformative nature of the tonic. With each sip, the imbiber is imbued with renewed strength, resolve, and unwavering courage to face the most daunting challenges that lie ahead.","misc":"Use: Remove Fear (2) Single Use"},{"craft":"ALCH","name":"Tonic of Diminution","category":"[Potion]","ecl":"20","tier":"T2","description":"This swirling violet liquid seems to never have the same amount of liquid in the vial as the last time you looked.","misc":"Use: Reduce Person (2) Single Use"},{"craft":"ALCH","name":"Tonic of Growth","category":"[Potion]","ecl":"18","tier":"T2","description":"Orange liquid with flakes of other colors, litter this potion.","misc":"Use: Enlarge Person (2) Single Use"},{"craft":"ALCH","name":"Tonic of Ironguts","category":"[Potion]","ecl":"12","tier":"T2","description":"This potion protects the wearer from poison, granting a +4 circumstance bonus on Fortitude saves against all poisons.","misc":"Use: Ironguts (2) Single Use"},{"craft":"ALCH","name":"Tonic of Magnetism","category":"[Potion]","ecl":"22","tier":"T2","description":"Introducing the Tonic of Magnetism, a remarkable elixir that unveils a purplish-pink hue, radiating an otherworldly aura. When consumed, a potent magical field envelops the caster, bestowing upon them an enchanting power of attraction. Within this magnetic sphere, the laws of probability bend, reducing nearby enemies chances of successfully landing ranged attacks by 20%. As projectiles veer off course or are inexplicably drawn astray, the caster finds themselves protected by this captivating force. The purplish-pink radiance of the tonic reflects the harmonious fusion of magic and magnetism, offering a shield against incoming attacks and tilting the odds in the caster's favor.","misc":"Use: Entropic Shield (5) Single Use"},{"craft":"ALCH","name":"Tonic of Retreat","category":"[Potion]","ecl":"18","tier":"T2","description":"Unveil the potion of expeditious retreat, a vial brimming with a vibrant green liquid that pulsates with an aura of swiftness and agility. As you gaze upon its mesmerizing hue, you sense the energy contained within. When consumed, this elixir grants a surge of fleetness, empowering the imbiber with enhanced speed and nimbleness. The verdant liquid seems to embody the essence of rapid movement, evoking images of a verdant forest in a swift blur, or a gust of wind propelling one forward. With each sip, the potion imbues the adventurer with the ability to navigate the world with unparalleled celerity, a valuable asset in evading foes or seizing fleeting opportunities.","misc":"Use: Expeditious Retreat (5) Single Use"},{"craft":"ALCH","name":"Tonic of Stone, Weak","category":"[Potion]","ecl":"22","tier":"T2","description":"This thick concoction smells earthy and has a chalky taste.","misc":"Use: Lesser Stoneskin (3) Single Use"},{"craft":"ALCH","name":"Tonic of Truth","category":"[Potion]","ecl":"20","tier":"T2","description":"These potions are in equal demand by adventurers and scholars, and see much use in the dungeons of Faerun.","misc":"Use: Identify (3) Single Use"},{"craft":"ALCH","name":"Tonic of Waterbreathing","category":"[Potion]","ecl":"15","tier":"T2","description":"This watery mix smells like soap.","misc":"Use: Water Breathing (5) Single Use"},{"craft":"ALCH","name":"Tonic of the Elements","category":"[Potion]","ecl":"20","tier":"T2","description":"A swirling liquid that flickers between a cold blue sheen and a warm ember glow. When consumed, the imbiber feels a brief rush of elemental energy, followed by a subtle protective aura that wards off one selected type of elemental harm.","misc":"Use: Endure Elements (2) Single Use"},{"craft":"ALCH","name":"Tonic of the Night","category":"[Potion]","ecl":"20","tier":"T2","description":"This tonic seems to have a hint of a glow to it, it's purpose appears to be helping you see in darkness.","misc":"Use: Ultravision (3) Single Use"},{"craft":"ALCH","name":"Tonic of the Trees","category":"[Potion]","ecl":"22","tier":"T2","description":"This thick concoction smells dark and musty, like a forest after heavy rains.","misc":"Use: Barkskin (6) Single Use"},{"craft":"ALCH","name":"Sedative","category":"[Sedative]","ecl":"15","tier":"T2","description":"This small jar contains foul-smelling milky white liquid. It is rumored to have helped some treat insomnia, while others were put into a coma.","misc":"Use: Unique Power Self Only Unlimited Uses/Day"},{"craft":"ALCH","name":"Metal Dye Black","category":"[Dye]","ecl":"28","tier":"T3","description":"This bottle of dye can rubbed into any metal, to alter the hue of the metal.","misc":"Use: Dye: Metal 1 1 Charge/Use\nUse: Dye: Metal 2 1 Charge/Use"},{"craft":"ALCH","name":"Metal Dye Blue","category":"[Dye]","ecl":"28","tier":"T3"},{"craft":"ALCH","name":"Metal Dye Silver","category":"[Dye]","ecl":"28","tier":"T3","description":"This bottle of dye can rubbed into any metal, to alter the hue of the metal.","misc":"Use: Dye: Metal 1 1 Charge/Use\nUse: Dye: Metal 2 1 Charge/Use"},{"craft":"ALCH","name":"Inkwel, Harpy","category":"[Ink]","ecl":"24","tier":"T3","misc":"25 Ink Charges"},{"craft":"ALCH","name":"Healing Salve, Large","category":"[Medicine]","ecl":"30","tier":"T3","description":"A healing salve used to mend wounds. Cannot be used to stabilize an unconscious person. Can only be used once every 90m.","misc":"Use: Unique Power Unlimited Uses/Day"},{"craft":"ALCH","name":"Medical Kit, Surgeon","category":"[Medicine]","ecl":"32","tier":"T3","description":"This bag contains many useful items for caring for the critically wounded, small needles, twine and pliers for extracting metal from flesh."},{"craft":"ALCH","name":"Sterile Bandage, Silk","category":"[Medicine]","ecl":"28","tier":"T3","description":"A sterile silk bandage used to mend wounds.","ooc":"OOC Information: Cannot be used to stabilize an unconscious person. Can only be used once every 90m. This bandage heals 3 hit points after succeeding on the DC 12 heal check, then +3hp for every point over the heal check DC 12 you exceed, to a max of 60hp.","misc":"Use: Unique Power Unlimited Uses/Day"},{"craft":"ALCH","name":"Fertilizer, Tru-Grow","category":"[Miscellaneous]","ecl":"28","tier":"T3","description":"True-Grow fertilizer, a premium-grade blend of carefully selected nutrients and enriching compounds, empowers plants to reach their full potential, promoting robust growth, lush foliage, and vibrant blooms.","ooc":"Starts with 10 charges"},{"craft":"ALCH","name":"Elixir of Flesh Renewal","category":"[Potion]","ecl":"32","tier":"T3","description":"This potion comes in a delicate vial containing a thick, pink liquid that continuously swirls with a life of its own. When held up to the light, one can almost see tiny flecks of what could be mistaken for skin cells perpetually regenerating and dissolving in its depths. Upon the uncorking of the vial, a faint aroma, reminiscent of spring and new growth, wafts from the potion, invigorating the senses and hinting at its powerful restorative properties.","misc":"Use: Stone to Flesh (5) Single Use"},{"craft":"ALCH","name":"Healing Tonic, Adventurer","category":"[Potion]","ecl":"30","tier":"T3","description":"Used as often in the peasant's home as the dungeon's dark, these simple concoctions are common throughout Faerun.","misc":"Use: Cure Serious Wounds (5) Single Use"},{"craft":"ALCH","name":"Tonic of Clandestine","category":"[Potion]","ecl":"25","tier":"T3","description":"This tonic appears full of a dark liquid.","misc":"Use: Rogue's Cunning (3) Single Use"},{"craft":"ALCH","name":"Tonic of Invisibility","category":"[Potion]","ecl":"28","tier":"T3","description":"This potion's fluid appears to swirl almost like it's not there fading in and out of existence.","misc":"Use: Invisibility (3) Single Use"},{"craft":"ALCH","name":"Tonic of Speed","category":"[Potion] const PRESETS_KEY = 'ggvl-presets';
function loadPresets() { try { return JSON.parse(localStorage.getItem(PRESETS_KEY) || '[]'); } catch { return []; } }
function savePresets(p) { localStorage.setItem(PRESETS_KEY, JSON.stringify(p)); }



// ── helpers ───────────────────────────────────────────────────────────────────
function parseSkillLine(line) {
  const m = line.match(/Skill Rating: (.+?) ([+-]\d+)d4/);
  if (!m) return null;
  return { skill: m[1], dice: parseInt(m[2]), sign: m[2][0] === '-' ? -1 : 1 };
}
function parseWarmth(str) {
  if (!str) return 0;
  const m = str.match(/([+-]\d+)/);
  return m ? parseInt(m[1]) : 0;
}
function getSkillLines(item) { return [item.sr1, item.sr2, item.sr3, item.sr4].filter(Boolean); }
function getPenaltyLines(item) {
  if (!item.sk_pen) return [];
  return item.sk_pen.split('\n').filter(Boolean);
}

    if (Object.keys(summary.penaltyMap).length > 0) {
      lines.push('── Skill Penalties ──');
      Object.entries(summary.penaltyMap).sort((a,b) => a[0].localeCompare(b[0])).forEach(([sk, en]) => {
        const diceTotal = en.filter(e => !e.flat).reduce((s,e) => s+e.dice, 0);
        const flatTotal = en.filter(e => e.flat).reduce((s,e) => s+e.dice, 0);
        const parts = [];
        if (diceTotal) parts.push(`-${diceTotal}d4`);
        if (flatTotal) parts.push(`-${flatTotal}`);
        lines.push(`${sk}: ${parts.join(' ') || '0'}`);
      });
      lines.push('');
    }

    lines.push('Generated by GGVL Build Planner');

    // Masterwork Properties
    if (mwEntries.length > 0) {
      lines.push('');
      lines.push('── Masterwork Properties ──');
      mwEntries.forEach(e => lines.push(`${e.property}: +${e.value}`));
    }

    const text = lines.join('\n');
    const finish = () => { setExportCopied(true); setTimeout(() => setExportCopied(false), 2000); };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(finish).catch(() => fallbackCopy(text, finish));
    } else {
      fallbackCopy(text, finish);
    }
  };

  const fallbackCopy = (text, cb) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); cb(); } catch(e) { alert('Copy failed — please copy manually:\n\n' + text); }
    document.body.removeChild(ta);
  };

  const RAW_DATA = BAKED_DATA;
  const BROWSEABLE = useMemo(() => RAW_DATA.filter(i => !isExcluded(i)).length, []);

  const allCats   = useMemo(() => ['All', ...Array.from(new Set(RAW_DATA.filter(i => !isExcluded(i)).map(i => i.category || '').filter(Boolean))).sort()], [RAW_DATA]);
  const allSkills = useMemo(() => {
    const s = new Set();
    const included = RAW_DATA.filter(i => !isExcluded(i));
    // sr1/sr2/sr3 skill ratings
    included.forEach(i => getSkillLines(i).forEach(l => { const p = parseSkillLine(l); if (p) s.add(p.skill); }));
    // caster rating
    included.forEach(i => { if (i.caster) s.add('Caster Rating'); });
    // ki rating
    included.forEach(i => { if (i.ki) s.add('Ki Rating'); });
    // deflection rating
    included.forEach(i => { if (i.deflection) s.add('Deflection Rating'); });
    // remove skills that only appear as penalties (sk_pen only, never in sr1/sr2/sr3)
    const penOnly = new Set();
    included.forEach(i => { if (i.sk_pen) i.sk_pen.split('\n').forEach(l => { const m = l.match(/Decreased Skill Rating: (.+?) /); if (m && !s.has(m[1])) penOnly.add(m[1]); }); });
    penOnly.forEach(p => s.delete(p));
    return ['All', ...Array.from(s).sort()];
  }, [RAW_DATA]);

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return RAW_DATA.filter(i => {
      if (isExcluded(i)) return false;
      if (!craftFilter.has(i.craft)) return false;
      if (catFilter   !== 'All' && (i.category || '') !== catFilter) return false;
      if (skillFilter !== 'All') {
        const skills = getSkillLines(i).map(l => parseSkillLine(l)?.skill).filter(Boolean);
        if (skillFilter === 'Ki Rating') { if (!i.ki) return false; }
        else if (skillFilter === 'Deflection Rating') { if (!i.deflection) return false; }
        else if (skillFilter === 'Caster Rating') { if (!i.caster) return false; } else if (!skills.includes(skillFilter)) return false;
      }
      if (q && !i.name.toLowerCase().includes(q)) return false;
      const tierKey = !i.tier ? 'T0' : i.tier.startsWith('T0') ? 'T0' : i.tier === 'T1' ? 'T1' : i.tier === 'T2' ? 'T2' : i.tier === 'T3' ? 'T3' : 'T1';
      if (!tierFilter.has(tierKey)) return false;
      return true;
    });
  }, [RAW_DATA, search, craftFilter, catFilter, skillFilter, tierFilter]);

  const sortedFiltered = useMemo(() => {
    const arr = [...filtered];
    arr.sort((a, b) => {
      let av, bv;
      if (sortCol === 'ecl') { av = parseInt(a.ecl) || 0; bv = parseInt(b.ecl) || 0; }
      else if (sortCol === 'tier') { const o = {'T0 Basic':0,'T0 SURV':0,'T0':0,'T1':1,'T2':2,'T3':3}; av = o[a.tier]??0; bv = o[b.tier]??0; }
      else if (sortCol === 'category') { av = (a.category||'').toLowerCase(); bv = (b.category||'').toLowerCase(); }
      else { av = (a.name||'').toLowerCase(); bv = (b.name||'').toLowerCase(); }
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return arr;
  }, [filtered, sortCol, sortDir]);

  const RING_EXCEPTIONS = new Set(['Copper Ring Mail','Bronze Ring Mail','Iron Ring Mail']);
  const isRing = name => /\bRing\b/i.test(name) && !RING_EXCEPTIONS.has(name);

  const MULTI_SLOT = [
    { test: n => /Cold Weather/i.test(n),              max: 3 },
    { test: n => /Heavy Shield Plating/i.test(n),      max: 2 },
    { test: n => /Accessory Reinforcement/i.test(n),   max: 4 },
    { test: n => /Weapon Guard/i.test(n),              max: 2 },
    { test: n => /Weaving Reinforcement/i.test(n),     max: 2 },
  ];
  const getMaxSlots = name => {
    if (isRing(name)) return 2;
    const entry = MULTI_SLOT.find(e => e.test(name));
    return entry ? entry.max : 1;
  };
  const isMultiSlot = name => getMaxSlots(name) > 1;

  const selCount = useMemo(() => Array.from(selected.values()).reduce((s,v) => s+v, 0), [selected]);

  const toggle = name => { setSelected(prev => {
    const n = new Map(prev);
    const cur = n.get(name) || 0;
    if (cur === 0) { n.set(name, 1); }
    else { n.delete(name); }
    return n;
  }); };
  const setSlot = (name, slot, checked) => setSelected(prev => {
    const n = new Map(prev);
    const cur = n.get(name) || 0;
    if (checked) { n.set(name, Math.max(slot, cur)); }
    else {
      if (slot === 1) { n.delete(name); }
      else { n.set(name, slot - 1); }
    }
    return n;
  });
  const removeOne = name => setSelected(prev => {
    const n = new Map(prev);
    const cur = n.get(name) || 0;
    if (cur <= 1) n.delete(name); else n.set(name, cur - 1);
    return n;
  });

  // ── Build summary ────────────────────────────────────────────────────────
  const summary = useMemo(() => {
    const items = [];
    RAW_DATA.forEach(i => { const c = selected.get(i.name); if (c) for (let x=0;x<c;x++) items.push(i); });
    const skillMap = {}, penaltyMap = {};
    const dmgImm=[], dmgVul=[], dmgAtk=[], saving=[];
    const warmthItems=[], arcane=[], conceal=[], caster={}, ki=[], deflection=[], evasion=[], defense=[];
    const spell=[], climb=[], wt_red=[], feat=[], enhance=[], use=[], misc=[], weightItems=[];
    let weightTotal = 0;
    let warmthTotal = 0;
    items.forEach(item => {
      getSkillLines(item).forEach(line => {
        const p = parseSkillLine(line); if (!p) return;
        if (!skillMap[p.skill]) skillMap[p.skill] = [];
        skillMap[p.skill].push({ item: item.name, dice: Math.abs(p.dice), sign: p.sign });
      });
      getPenaltyLines(item).forEach(line => {
        const mDice = line.match(/Decreased Skill Rating: (.+?) (-\d+)d4/);
        const mFlat = !mDice && line.match(/Decreased Skill Rating: (.+?) (-\d+)$/);
        const m = mDice || mFlat;
        if (!m) return;
        if (!penaltyMap[m[1]]) penaltyMap[m[1]] = [];
        penaltyMap[m[1]].push({ item: item.name, dice: Math.abs(parseInt(m[2])), flat: !!mFlat });
      });
      if (item.dmg_imm) item.dmg_imm.split('\n').forEach(l => l && dmgImm.push({ item: item.name, line: l }));
      if (item.dmg_vul) item.dmg_vul.split('\n').forEach(l => l && dmgVul.push({ item: item.name, line: l }));
      if (item.dmg_atk) item.dmg_atk.split('\n').forEach(l => l && dmgAtk.push({ item: item.name, line: l }));
      if (item.saving)  item.saving.split('\n').forEach(l => l && saving.push({ item: item.name, line: l }));
      if (item.warmth)  { warmthTotal += parseWarmth(item.warmth); warmthItems.push({ item: item.name, val: item.warmth }); }
      if (item.arcane)  arcane.push({ item: item.name, line: item.arcane });
      if (item.conceal) conceal.push({ item: item.name, line: item.conceal });
      if (item.caster)  item.caster.split('\n').forEach(l => {
        if (!l) return;
        const m = l.match(/Caster Rating: (\w+) ([+-]?\d+)/);
        const cls = m ? m[1] : 'Unknown';
        if (!caster[cls]) caster[cls] = [];
        caster[cls].push({ item: item.name, line: l });
      });
      if (item.ki)      ki.push({ item: item.name, line: item.ki });
      if (item.deflection) deflection.push({ item: item.name, line: item.deflection });
      if (item.spell)   item.spell.split('\n').forEach(l => l && spell.push({ item: item.name, line: l }));
      if (item.climb)   climb.push({ item: item.name, line: item.climb });
      if (item.wt_red)  wt_red.push({ item: item.name, line: item.wt_red });
      if (item.weight)  { const m = item.weight.match(/([\d.]+)\s*lbs/i); const v = m ? parseFloat(m[1]) : 0; weightItems.push({ item: item.name, val: item.weight, num: v }); weightTotal += v; }
      if (item.feat)    item.feat.split('\n').forEach(l => l && feat.push({ item: item.name, line: l }));
      if (item.enhance) enhance.push({ item: item.name, line: item.enhance });
      if (item.use)     item.use.split('\n').forEach(l => l && use.push({ item: item.name, line: l }));
      if (item.misc)    item.misc.split('\n').forEach(l => l && misc.push({ item: item.name, line: l }));
    });
    // Inject masterwork skill bonuses (flat, not dice)
    mwEntries.forEach(e => {
      if (MW_SKILLS.includes(e.property)) {
        if (!skillMap[e.property]) skillMap[e.property] = [];
        skillMap[e.property].push({ item: 'Masterwork', dice: e.value, sign: 1, mw: true });
      }
    });
    // Inject masterwork rating bonuses
    mwEntries.forEach(e => {
      if (e.property.startsWith('Caster Rating: ')) {
        const cls = e.property.replace('Caster Rating: ', '');
        if (!caster[cls]) caster[cls] = [];
        caster[cls].push({ item: 'Masterwork', line: `${e.property} +${e.value}`, mw: true });
      }
      if (e.property === 'Ki Rating')         ki.push({ item: 'Masterwork', line: `Ki Rating: +${e.value}`, mw: true });
      if (e.property === 'Deflection Rating') deflection.push({ item: 'Masterwork', line: `Deflection Rating: +${e.value}`, mw: true });
      if (e.property === 'Evasion Rating')    evasion.push({ item: 'Masterwork', line: `Evasion Rating: +${e.value}`, mw: true });
      if (e.property === 'Defense Rating')    defense.push({ item: 'Masterwork', line: `Defense Rating: +${e.value}`, mw: true });
    });
    // Tally dmg immunity & vulnerability totals by damage type
    const parseDmgPct = (lines) => {
      const totals = {};
      lines.forEach(({ line }) => {
        const m = line.match(/:\s*([A-Za-z ]+?)\s+(\d+)%/);
        if (m) { const t = m[1].trim(); totals[t] = (totals[t] || 0) + parseInt(m[2]); }
      });
      return totals;
    };
    const dmgImmTotals = parseDmgPct(dmgImm);
    const dmgVulTotals = parseDmgPct(dmgVul);
    return { items, skillMap, penaltyMap, dmgImm, dmgVul, dmgAtk, saving, warmthTotal, warmthItems, dmgImmTotals, dmgVulTotals, arcane, conceal, caster, ki, deflection, evasion, defense, spell, climb, wt_red, feat, enhance, use, misc, weightItems, weightTotal };
  }, [selected, RAW_DATA, mwEntries]);

  // ── Styles ────────────────────────────────────────────────────────────────
  const S = {
    app:      { fontFamily:"'Crimson Pro',Georgia,serif", fontSize:15, background:C.parchment, height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden', color:C.ink },

    // ── Header ──
    header: {
      background: `linear-gradient(135deg, var(--hdr-start) 0%, var(--hdr-mid) 60%, var(--hdr-end) 100%)`,
      color: C.glow,
      padding: '0 24px',
      display: 'flex', alignItems: 'stretch', justifyContent: 'space-between',
      flexShrink: 0,
      borderBottom: `3px solid ${C.accent}`,
      boxShadow: '0 3px 16px rgba(0,0,0,.45)',
      minHeight: 56,
      position: 'relative',
    },
    headerInner: { display:'flex', alignItems:'center', justifyContent:'space-between', width:'100%' },
    title: {
      fontFamily:"'Cinzel',serif", fontSize:20, fontWeight:700,
      color: C.glow, letterSpacing:'.06em', margin:0,
      textShadow:`0 0 18px rgba(200,151,58,.4)`,
    },
    subtitle: { fontFamily:"'Crimson Pro',serif", fontSize:12, color:'rgba(232,184,109,.55)', letterSpacing:'.12em', textTransform:'uppercase', marginTop:1 },
    badge: {
      background:'rgba(200,151,58,.18)', color:C.glow,
      border:`1px solid rgba(200,151,58,.4)`,
      borderRadius:12, padding:'3px 12px', fontWeight:700, fontSize:13,
      fontFamily:"'Cinzel',serif", letterSpacing:'.04em',
    },

    // ── Source bar ──
    sourceBar: {
      fontSize:12, color:C.inkLight, padding:'4px 20px',
      background:C.parchMid, borderBottom:`1px solid ${C.parchDark}`,
      flexShrink:0, display:'flex', alignItems:'center', gap:10,
      fontStyle:'italic',
    },

    // ── Tabs ──
    tabs:  { display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`2px solid ${C.parchDark}`, background:C.parchment, padding:'0 20px', flexShrink:0 },
    tab:   a => ({
      padding:'8px 12px 8px 6px', cursor:'pointer',
      fontFamily:"'Cinzel',serif", fontSize:13, letterSpacing:'.04em',
      fontWeight: a ? 700 : 400,
      color: a ? '#e6940a' : C.inkMid,
      borderBottom: a ? `3px solid #34A853` : '3px solid transparent',
      background:'none', border:'none', transition:'color .15s',
    }),

    // ── Layout ──
    body:    { display:'flex', flex:1, overflow:'hidden' },
    sidebar: {
      width:248, background:C.parchMid,
      borderRight:`1px solid ${C.parchDark}`,
      padding:14, overflowY:'auto', flexShrink:0,
      display:'flex', flexDirection:'column', gap:12,
    },
    label:   { fontWeight:700, fontSize:12, color:C.inkMid, marginBottom:3, display:'block', textTransform:'uppercase', letterSpacing:'.06em' },
    input:   { width:'100%', padding:'5px 8px', border:`1px solid ${C.parchDark}`, borderRadius:3, fontSize:14, fontFamily:"'Crimson Pro',serif", background:'var(--input-bg)', color:'var(--input-txt)' },
    select:  { width:'100%', padding:'5px 8px', border:`1px solid ${C.parchDark}`, borderRadius:3, fontSize:14, fontFamily:"'Crimson Pro',serif", background:'var(--input-bg)', color:'var(--input-txt)' },
    main:    { flex:1, overflowY:'auto', padding:16, background:C.parchment },

    // ── Table ──
    table: { width:'100%', borderCollapse:'collapse', fontSize:14, background:'var(--table-bg)', boxShadow:'0 1px 6px rgba(0,0,0,.1)', borderRadius:4, overflow:'hidden' },
    thSort: { color:C.accent, cursor:'pointer', userSelect:'none' },
    th:    bg => ({ background: bg||'var(--table-head)', color:'var(--table-head-txt)', padding:'7px 10px', textAlign:'left', fontWeight:700, fontSize:12, borderBottom:`1px solid var(--table-head-bdr)`, whiteSpace:'nowrap', letterSpacing:'.05em', textTransform:'uppercase', fontFamily:"'Cinzel',serif" }),
    td:    { padding:'5px 10px', verticalAlign:'top', borderBottom:`1px solid var(--parchment-dark)`, fontSize:14 },

    pill:  c => ({ background:c, borderRadius:10, padding:'1px 8px', fontSize:12, fontWeight:700, display:'inline-block' }),

    // ── Summary cards ──
    summCard: {
      background:'var(--card-bg)',
      border:`1px solid ${C.parchDark}`,
      borderRadius:5,
      marginBottom:14,
      overflow:'hidden',
      boxShadow:'0 2px 8px rgba(0,0,0,.08)',
      breakInside:'avoid',
    },
    summHead: (color, accent) => ({
      background: `linear-gradient(135deg, ${color} 0%, ${accent||color} 100%)`,
      color:'#fff',
      padding:'8px 16px',
      fontFamily:"'Cinzel',serif",
      fontWeight:700, fontSize:13, letterSpacing:'.06em',
      borderBottom:`2px solid rgba(255,255,255,.15)`,
      textShadow:'0 1px 3px rgba(0,0,0,.4)',
      display:'flex', alignItems:'center', gap:8,
    }),
    summBody: { padding:'12px 16px', background:'var(--card-bg)' },

    row:     { display:'flex', justifyContent:'space-between', padding:'3px 0', borderBottom:`1px solid ${C.parchMid}`, fontSize:14 },
    itemTag: { fontSize:12, color:C.inkMid, fontStyle:'italic', marginLeft:8, flexShrink:0 },
    diceGood:{ fontWeight:700, color:C.green },
    diceBad: { fontWeight:700, color:C.red },
    noItems: { color:C.inkLight, fontStyle:'italic', padding:12, textAlign:'center' },

    clearBtn: { background:C.red,  color:'#fff', border:'none', borderRadius:3, padding:'4px 11px', cursor:'pointer', fontSize:12, fontFamily:"'Crimson Pro',serif" },
    selCount: { background:'rgba(200,151,58,.18)', color:C.glow, border:`1px solid rgba(200,151,58,.4)`, borderRadius:4, padding:'3px 10px', fontSize:13, fontWeight:700, fontFamily:"'Cinzel',serif" },
    stubBadge:{ background:'#c2410c', color:'#fff', borderRadius:3, padding:'0 5px', fontSize:11, fontWeight:700, marginLeft:5, verticalAlign:'middle' },
    ovBadge:  { background:'#6d28d9', color:'#fff', borderRadius:3, padding:'0 5px', fontSize:11, fontWeight:700, marginLeft:5, verticalAlign:'middle' },
  };

  // Tier badge helper
  const tierBadge = (tier) => {
    if (!tier) return null;
    const cls = tier.startsWith('T0') ? 'tier-t0' : tier === 'T1' ? 'tier-t1' : tier === 'T2' ? 'tier-t2' : tier === 'T3' ? 'tier-t3' : 'tier-t1';
    const label = tier.startsWith('T0') ? 'T0' : tier;
    return <span className={`tier-badge ${cls}`}>{label}</span>;
  };

  const SectionCard = ({ title, color, accent, icon, children }) => (
    <div style={S.summCard}>
      <div style={S.summHead(color, accent)}>{icon && <span>{icon}</span>}{title}</div>
      <div style={S.summBody}>{children}</div>
    </div>
  );

  const PropRow = ({ line, itemName }) => (
    <div style={S.row}><span>{line}</span><span style={S.itemTag}>{itemName}</span></div>
  );

  const SkillRow = ({ skill, entries }) => {
    const diceTotal = entries.filter(e => !e.mw).reduce((s, e) => s + e.dice * e.sign, 0);
    const flatTotal = entries.filter(e => e.mw).reduce((s, e) => s + e.dice * e.sign, 0);
    const totalStr = (() => {
      const parts = [];
      if (diceTotal !== 0) parts.push(`${diceTotal >= 0 ? '+' : ''}${diceTotal}d4`);
      if (flatTotal !== 0) parts.push(`${flatTotal >= 0 ? '+' : ''}${flatTotal}`);
      return (parts.join(' ') || '0') + ' total';
    })();
    const totalPositive = (diceTotal + flatTotal) >= 0;
    return (
      <div style={{ marginBottom: 9 }}>
        <div style={{ fontWeight: 700, fontSize: 13, color: C.ink, marginBottom: 2 }}>
          {skill} <span style={totalPositive ? S.diceGood : S.diceBad}>{totalStr}</span>
        </div>
        {entries.map((e, i) => (
          <div key={i} style={{ ...S.row, paddingLeft: 10 }}>
            <span style={e.mw ? {fontWeight:700,color:'#FBBF24'} : (e.sign > 0 ? S.diceGood : S.diceBad)}>{e.sign > 0 ? '+' : '-'}{e.dice}{e.mw ? '' : 'd4'}</span>
            <span style={e.mw ? {fontSize:11,color:'#FBBF24',fontStyle:'italic'} : S.itemTag}>{e.mw ? '⭐ Masterwork' : e.item}</span>
          </div>
        ))}
      </div>
    );
  };

  const getRowBg = (item, ri) => ri % 2 === 0 ? C.parchMid : (CRAFT_BG[item.craft] || C.parchMid);

  return (
    <div style={S.app}>

      {/* Header */}
      <div style={S.header}>
        <div style={S.headerInner}>
          <div>
            <h1 style={S.title}>⚔ GGVL Build Planner</h1>
            <div style={S.subtitle}>Gwylim, Gunak, Vicho, & Lain — Crafting Catalogue</div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            {selCount > 0 && <span style={S.selCount}>{selCount} selected</span>}
            <button type="button" onClick={() => { setTourStep(0); setTourOpen(true); }}
              style={{ background:'none', border:`1px solid rgba(200,151,58,.4)`, borderRadius:'50%',
                width:26, height:26, cursor:'pointer', color:C.glow, fontSize:13, fontWeight:700,
                fontFamily:"'Cinzel',serif", lineHeight:1, flexShrink:0 }}
              title="Help / Tour">?</button>
          </div>
        </div>
      </div>

      {/* Source bar removed from header area — now in sidebar footer */}

      {/* Tabs */}
      <div style={S.tabs}>
        <div style={{ display:'flex', alignItems:'stretch' }}>
          <button style={S.tab(view === 'browse')}  onClick={() => { setView('browse'); setSidebarOpen(true); }}>📋 Browse Items</button>
          <button style={S.tab(view === 'summary')} onClick={() => { setView('summary'); setSidebarOpen(false); }}>🧩 Build Summary {selCount > 0 && `(${selCount})`}</button>
          {!savingPreset ? (
            <button onClick={savePreset} disabled={selCount === 0}
              style={{ background:'none', border:'none', cursor: selCount > 0 ? 'pointer' : 'default',
                color: selCount > 0 ? C.accent : C.inkMid, fontSize:22, fontWeight:700,
                lineHeight:1, padding:'0 10px', alignSelf:'center', opacity: selCount > 0 ? 1 : 0.35 }}>
              +
            </button>
          ) : (
            <div style={{ display:'flex', alignItems:'center', gap:4, padding:'0 8px' }}>
              <input autoFocus value={presetInput} onChange={e => setPresetInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') confirmSavePreset(); if (e.key === 'Escape') setSavingPreset(false); }}
                placeholder="Build name…"
                style={{ ...S.input, width:130, fontSize:12, padding:'3px 7px' }} />
              <button onClick={confirmSavePreset} style={{ background:C.accent, border:'none', borderRadius:3, padding:'3px 8px', cursor:'pointer', fontSize:12, fontWeight:700, color:'#1a1a0e' }}>✓</button>
              <button onClick={() => setSavingPreset(false)} style={{ background:'none', border:'none', cursor:'pointer', color:C.inkMid, fontSize:13 }}>✕</button>
            </div>
          )}
          {presets.map((p, i) => {

                              {sk} <span style={S.diceBad}>{totalStr}</span>
                            </div>
                            {en.map((e,i) => <div key={i} style={{ ...S.row, paddingLeft: 10 }}><span style={S.diceBad}>-{e.dice}{e.flat ? '' : 'd4'}</span><span style={S.itemTag}>{e.item}</span></div>)}
                          </div>
                        );
                      })}
                    </SectionCard>
                  )}
                  <SectionCard title="Masterwork Properties" color="#92400e" accent="#F59E0B" icon="⭐">
                    {/* Toggle button */}
                    {!mwAdding && (
                      <button
                        type="button"
                        onClick={() => withScrollLock(() => setMwAdding(true))}
                        style={{display:'flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:4,border:`1px solid #FBBF24`,background:'transparent',color:'#FBBF24',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Crimson Pro',serif",marginBottom: mwEntries.length > 0 ? 8 : 0}}
                      >＋ Add Masterwork</button>
                    )}
                    {/* Input row — visible only when mwAdding */}
                    {mwAdding && (
                      <div style={{display:'flex',gap:6,marginBottom:8,alignItems:'center',flexWrap:'wrap'}}>
                        <select
                          value={mwDropdown}
                          onChange={e => { const v = e.target.value; withScrollLock(() => setMwDropdown(v)); }}
                          style={{flex:'1 1 140px',minWidth:0,padding:'4px 6px',borderRadius:4,border:`1px solid #FBBF24`,background:'var(--card-bg)',color:C.ink,fontSize:13,fontFamily:"'Crimson Pro',serif"}}
                        >
                          <optgroup label="── Skills ──">
                            {MW_SKILLS.map(s => <option key={s} value={s}>{s}</option>)}
                          </optgroup>
                          <optgroup label="── Ratings ──">
                            {MW_RATINGS.map(r => <option key={r} value={r}>{r}</option>)}
                          </optgroup>
                        </select>
                        <div style={{display:'flex',alignItems:'center',gap:4}}>
                          <span style={{color:'#FBBF24',fontWeight:700}}>+</span>
                          <input
                            type="text" inputMode="numeric" value={mwValue}
                            onChange={e => { const v = e.target.value; withScrollLock(() => setMwValue(v)); }}
                            onKeyDown={e => e.key === 'Enter' && addMwEntry()}
                            placeholder="N"
                            style={{width:54,padding:'4px 6px',borderRadius:4,border:`1px solid #FBBF24`,background:'var(--card-bg)',color:C.ink,fontSize:13,fontFamily:"'Crimson Pro',serif",textAlign:'center'}}
                          />
                        </div>
                        <button type="button" onClick={addMwEntry} style={{padding:'4px 12px',borderRadius:4,border:'none',background:'#F59E0B',color:'#1c1008',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:"'Crimson Pro',serif"}}>Add</button>
                        <button type="button" onClick={() => withScrollLock(() => { setMwAdding(false); setMwValue(''); })} style={{padding:'4px 8px',borderRadius:4,border:`1px solid #FBBF24`,background:'transparent',color:'#FBBF24',fontSize:12,cursor:'pointer',fontFamily:"'Crimson Pro',serif"}}>Cancel</button>
                      </div>
                    )}
                    {/* Entry list */}
                    {mwEntries.length === 0 && !mwAdding
                      ? <div style={{color:C.inkMid,fontSize:12,fontStyle:'italic',marginTop:4}}>No masterwork bonuses added.</div>
                      : mwEntries.map((e,i) => (
                          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',borderBottom:`1px solid rgba(251,191,36,.2)`}}>
                            <span style={{color:'#FBBF24',fontWeight:700,fontSize:13}}>{e.property} <span style={{color:'#FDE68A'}}>+{e.value}</span></span>
                            <button type="button" onClick={() => removeMwEntry(i)} style={{background:'none',border:'none',cursor:'pointer',color:C.inkMid,fontSize:14,padding:'0 4px',lineHeight:1}}>×</button>
                          </div>
                        ))
                    }
                  </SectionCard>

                  {summary.weightItems.length > 0 && (
                    <SectionCard title="Item Weight" color="#374151" accent="#4b5563" icon="⚖">
                      <div style={{fontWeight:700,fontSize:15,color:'#4b5563',marginBottom:6}}>Total: {summary.weightTotal % 1 === 0 ? summary.weightTotal : summary.weightTotal.toFixed(1)} lbs</div>
                      {summary.weightItems.map((w,i) => (
                        <div key={i} style={{...S.row}}>
                          <span style={{color:C.ink}}>{w.val}</span>
                          <span style={S.itemTag}>{w.item}</span>
                        </div>
                      ))}
                    </SectionCard>
                  )}
                  {(summary.arcane.length||summary.conceal.length||summary.spell.length||summary.climb.length||summary.wt_red.length||summary.feat.length||summary.enhance.length||summary.use.length||summary.misc.length) > 0 && (
                    <SectionCard title="Other Properties" color="#5c4a2a" accent="#7a6340" icon="✨">
                      {summary.spell.length   > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Bonus Spell Slots</div>{summary.spell.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.conceal.length > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Concealment</div>{summary.conceal.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.arcane.length  > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Arcane Spell Failure</div>{summary.arcane.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.enhance.length > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Enhancement Bonus</div>{summary.enhance.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.feat.length    > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Bonus Feats</div>{summary.feat.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.climb.length   > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Climbing Modifier</div>{summary.climb.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.wt_red.length  > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Weight Reduction</div>{summary.wt_red.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.use.length     > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Use / Limitation</div>{summary.use.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                      {summary.misc.length    > 0 && <><div style={{fontWeight:700,fontSize:12,color:C.inkMid,margin:'6px 0 3px',textTransform:'uppercase',letterSpacing:'.06em'}}>Miscellaneous</div>{summary.misc.map((d,i)=><PropRow key={i} line={d.line} itemName={d.item}/>)}</>}
                    </SectionCard>
                  )}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      </div>


      {/* ── Tour Modal ── */}
      {tourOpen && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.75)', zIndex:2000, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}
          onClick={() => closeTour()}>
          <div onClick={e => e.stopPropagation()}
            style={{ background:'var(--card-bg)', border:`1px solid #1d6632`, borderRadius:8,
              boxShadow:`0 8px 40px rgba(0,0,0,.7), 0 0 0 1px rgba(52,168,83,.25), 0 0 40px rgba(29,102,50,.2)`,
              width:'100%', maxWidth:480, padding:'28px 28px 20px', display:'flex', flexDirection:'column', gap:16,
              position:'relative', overflow:'hidden' }}>

            {/* Ribbon */}
            <div style={{
              position:'absolute', top:0, left:0, right:0, height:12,
              background:'linear-gradient(90deg, #0d2e18 0%, #1d6632 25%, #34A853 50%, #1d6632 75%, #0d2e18 100%)',
              boxShadow:'0 2px 12px rgba(52,168,83,.55)',
            }} />

            {/* Step indicator */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontFamily:"'Cinzel',serif", fontSize:11, color:C.inkMid, letterSpacing:'.08em', textTransform:'uppercase' }}>
                {tourStep + 1} of {TOUR_SLIDES.length}
              </span>
              <button type="button" onClick={() => closeTour()}
                style={{ background:'none', border:'none', cursor:'pointer', color:C.inkMid, fontSize:18, lineHeight:1, padding:'0 2px' }}>×</button>
            </div>

            {/* Slide content */}
            <div style={{ textAlign:'center', padding:'4px 0 8px' }}>
              <div style={{ fontSize:40, marginBottom:12 }}>{tourSlide.icon}</div>
              <div style={{ fontFamily:"'Cinzel',serif", fontSize:17, fontWeight:700, color:C.glow, marginBottom:12, letterSpacing:'.03em' }}>{tourSlide.title}</div>
              <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:15, color:C.ink, lineHeight:1.6 }}>{tourSlide.body}</div>
            </div>

            {/* Progress dots */}
            <div style={{ display:'flex', justifyContent:'center', gap:6 }}>
              {TOUR_SLIDES.map((_, i) => (
                <div key={i} onClick={() => setTourStep(i)}
                  style={{ width:7, height:7, borderRadius:'50%', cursor:'pointer',
                    background: i === tourStep ? C.accent : C.inkMid,
                    opacity: i === tourStep ? 1 : 0.4, transition:'all .15s' }} />
              ))}
            </div>

            {/* Nav buttons */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:8 }}>
              <button type="button" onClick={() => setTourStep(s => s - 1)} disabled={tourStep === 0}
                style={{ background:'none', border:`1px solid ${C.parchDark}`, borderRadius:4, padding:'6px 16px',
                  cursor: tourStep === 0 ? 'default' : 'pointer', color: tourStep === 0 ? C.inkMid : C.ink,
                  opacity: tourStep === 0 ? 0.35 : 1, fontSize:13, fontFamily:"'Crimson Pro',serif" }}>
                ← Back
              </button>
              {tourLast ? (
                <button type="button" onClick={() => closeTour()}
                  style={{ background:C.accent, border:'none', borderRadius:4, padding:'6px 20px',
                    cursor:'pointer', color:'#1a1a0e', fontSize:13, fontWeight:700, fontFamily:"'Crimson Pro',serif" }}>
                  Get Started ⚔
                </button>
              ) : (
                <button type="button" onClick={() => setTourStep(s => s + 1)}
                  style={{ background:C.accent, border:'none', borderRadius:4, padding:'6px 20px',
                    cursor:'pointer', color:'#1a1a0e', fontSize:13, fontWeight:700, fontFamily:"'Crimson Pro',serif" }}>
                  Next →
                </button>
              )}
            </div>

          </div>
        </div>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BuildPlanner />);
</script>
</body>
</html>
